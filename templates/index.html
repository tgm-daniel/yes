<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffb5c2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <title>Still Learning 💕</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .lang-btn {
      position: absolute; top: 14px; right: 14px;
      background: var(--cream);
      border: 2px solid rgba(255,181,194,0.3);
      border-radius: var(--radius-cloud);
      padding: 6px 16px;
      font-size: 10px; font-weight: 800;
      cursor: pointer; color: var(--pink-dark);
      font-family: 'Press Start 2P', monospace;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10;
    }
    .lang-btn:hover { background: var(--pink); color: white; border-color: var(--pink); transform: scale(1.05); }
    .lang-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="floating-bg"></div>
  <div class="floating-items" id="floatingItems"></div>
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="card" style="position:relative;">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>

      <div class="card-heart">
        <svg viewBox="-10 -10 140 130" width="28" height="28">
          <defs>
            <linearGradient id="miniGradIdx" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb5c2" />
              <stop offset="100%" stop-color="#ff8fa0" />
            </linearGradient>
            <filter id="miniShadowIdx" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff8fa0" flood-opacity="0.3" />
            </filter>
          </defs>
          <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#miniGradIdx)" filter="url(#miniShadowIdx)" />
        </svg>
      </div>

      <div class="heart-character" id="heartCharacter">
        <svg viewBox="-15 -15 150 150" width="100" height="100" id="heartSvg">
          <defs>
            <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb5c2" />
              <stop offset="100%" stop-color="#ff8fa0" />
            </linearGradient>
            <filter id="heartShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#ff8fa0" flood-opacity="0.35" />
            </filter>
          </defs>
          <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#heartGrad)" filter="url(#heartShadow)" />
          <ellipse cx="80" cy="25" rx="18" ry="10" fill="rgba(255,255,255,0.4)" transform="rotate(-20 80 25)" />
          <circle cx="42" cy="42" r="8" fill="white" />
          <g class="eye-group" data-origin-x="45" data-origin-y="44">
            <circle class="pupil" cx="45" cy="44" r="4.5" fill="#4a3a5a" />
            <circle cx="46.5" cy="42" r="1.8" fill="white" />
          </g>
          <circle cx="78" cy="42" r="8" fill="white" />
          <g class="eye-group" data-origin-x="81" data-origin-y="44">
            <circle class="pupil" cx="81" cy="44" r="4.5" fill="#4a3a5a" />
            <circle cx="82.5" cy="42" r="1.8" fill="white" />
          </g>
          <ellipse cx="30" cy="56" rx="8" ry="4" fill="rgba(255,92,112,0.2)" />
          <ellipse cx="90" cy="56" rx="8" ry="4" fill="rgba(255,92,112,0.2)" />
          <path d="M48 58 Q60 68 72 58" stroke="#4a3a5a" stroke-width="2.5" fill="none" stroke-linecap="round" />
        </svg>
        <div class="heart-sparkles" id="heartSparkles"></div>
      </div>

      <h1 class="title" id="loginTitle">
        <span class="title-highlight">Still Learning</span>
      </h1>
      <div class="title-sub" id="loginSub">✦ continue aprendendo um ao outro ✦</div>

      <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
        <div class="input-group">
          <input type="text" id="loginName" class="login-input" placeholder="seu nome" autocomplete="off" required>
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" class="login-input" placeholder="senha" required>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          entrar! 💖
        </button>
      </form>
    </div>
  </div>

  <script>
    const _pt = { title: 'Still Learning',         sub: '✦ continuem aprendendo um com o outro ✦', namePH: 'seu nome', passPH: 'senha', btn: 'entrar!', errDefault: 'Erro ao entrar' };
    const _en = { title: 'Still Learning', sub: '✦ keep learning each other ✦', namePH: 'your name', passPH: 'password', btn: 'enter!', errDefault: 'Login failed' };

    function getLang() { const m = document.cookie.match(/lang=([^;]+)/); return m ? m[1] : 'pt'; }

    function applyLang() {
      const isEn = getLang() === 'en';
      const l = isEn ? _en : _pt;
      document.getElementById('loginTitle').querySelector('.title-highlight').textContent = l.title;
      document.getElementById('loginSub').textContent = l.sub;
      document.getElementById('loginName').placeholder = l.namePH;
      document.getElementById('loginPassword').placeholder = l.passPH;
      document.getElementById('loginBtn').innerHTML = l.btn + ' 💖';
      document.getElementById('langBtn').textContent = isEn ? 'PT' : 'EN';
    }

    function toggleLang() {
      document.cookie = 'lang=' + (getLang() === 'pt' ? 'en' : 'pt') + ';path=/;max-age=31536000';
      applyLang();
    }

    // Floating decorations
    const isMobile = window.innerWidth <= 600;
    const flowEmoji = ['💕','❤️','💗','💖','❤️‍🔥','🐱','🐰','🐶','🦊','🐼','🌸','⭐'];
    const bgCount = isMobile ? 6 : 10;
    const fc = document.getElementById('floatingItems');
    for (let i = 0; i < bgCount; i++) {
      const s = document.createElement('span');
      s.textContent = flowEmoji[i % flowEmoji.length];
      s.style.left = (5 + Math.random() * 85) + '%';
      s.style.top = (5 + Math.random() * 85) + '%';
      s.style.animationDelay = (Math.random() * 5) + 's';
      s.style.animationDuration = (7 + Math.random() * 5) + 's';
      s.style.fontSize = (isMobile ? 12 + Math.random() * 10 : 16 + Math.random() * 16) + 'px';
      fc.appendChild(s);
    }
    const starChars = ['✦','★','✧'];
    const st = document.getElementById('stars');
    const starCount = isMobile ? 4 : 8;
    for (let i = 0; i < starCount; i++) {
      const s = document.createElement('span');
      s.textContent = starChars[i % starChars.length];
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = (Math.random() * 3) + 's';
      s.style.fontSize = (isMobile ? 8 + Math.random() * 6 : 12 + Math.random() * 10) + 'px';
      st.appendChild(s);
    }

    const heart = document.getElementById('heartCharacter');
    const svg = document.getElementById('heartSvg');
    const eyeGroups = document.querySelectorAll('.eye-group');
    let eyeTicking = false;
    document.addEventListener('mousemove', (e) => {
      if (eyeTicking) return; eyeTicking = true;
      requestAnimationFrame(() => {
        const rect = heart.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / Math.max(rect.width, 1);
        const dy = (e.clientY - cy) / Math.max(rect.height, 1);
        const maxMove = 3;
        eyeGroups.forEach(g => {
          const ox = parseFloat(g.dataset.originX);
          const oy = parseFloat(g.dataset.originY);
          g.setAttribute('transform', `translate(${Math.max(-maxMove, Math.min(maxMove, dx * maxMove))}, ${Math.max(-maxMove, Math.min(maxMove, dy * maxMove))})`);
        });
        eyeTicking = false;
      });
    });

    heart.addEventListener('click', () => {
      heart.style.transform = 'scale(1.2)';
      setTimeout(() => { heart.style.transform = 'scale(1)'; }, 300);
      spawnSparkles();
    });

    heart.addEventListener('mouseenter', () => {
      svg.querySelector('path').style.filter = 'drop-shadow(0 0 12px rgba(255,143,160,0.5))';
    });
    heart.addEventListener('mouseleave', () => {
      svg.querySelector('path').style.filter = '';
    });

    function spawnSparkles() {
      const container = document.getElementById('heartSparkles');
      const sparkles = ['✨', '🌸', '💕', '⭐', '♥'];
      for (let i = 0; i < 8; i++) {
        const s = document.createElement('span');
        s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
        s.style.position = 'absolute';
        s.style.left = (20 + Math.random() * 60) + '%';
        s.style.top = (20 + Math.random() * 60) + '%';
        s.style.fontSize = (10 + Math.random() * 14) + 'px';
        s.style.pointerEvents = 'none';
        s.style.animation = 'sparklePop 1s ease-out forwards';
        container.appendChild(s);
        setTimeout(() => s.remove(), 1000);
      }
    }

    const style = document.createElement('style');
    style.textContent = `@keyframes sparklePop {
      0% { opacity: 1; transform: translateY(0) scale(0.5) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-30px) scale(1.2) rotate(180deg); }
    }`;
    document.head.appendChild(style);

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const error = document.getElementById('loginError');
      const name = document.getElementById('loginName').value.trim().toLowerCase();
      const password = document.getElementById('loginPassword').value;
      const isEn = getLang() === 'en';
      const l = isEn ? _en : _pt;

      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;
      error.textContent = '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, password }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || l.errDefault);
        }

        const data = await res.json();

        if (data.type === 'couple') {
          localStorage.setItem('couple_id', data.couple_id);
          localStorage.setItem('user_name', data.name);
          localStorage.setItem('user_display', data.name);
          localStorage.setItem('partner_name', data.partner_name);
          if (data.token) localStorage.setItem('auth_token', data.token);
          window.location.href = '/still-learning';
        } else if (data.incomplete) {
          window.location.href = `/quiz/${data.session_id}?resume=1`;
        } else if (data.already_completed) {
          window.location.href = `/retry/${data.session_id}`;
        } else {
          window.location.href = `/start/${data.profile_id}`;
        }
      } catch (err) {
        error.textContent = err.message;
        btn.innerHTML = l.btn + ' 💖';
        btn.disabled = false;
      }
    }

    applyLang();
  </script>
</body>
</html>
