<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffb5c2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
<title>Still Learning 💕</title>
<link rel="stylesheet" href="/static/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pink: #ffb5c2;
  --pink-dark: #ff8fa0;
  --pink-light: #ffe0e8;
  --lavender: #d4b8e8;
  --lavender-light: #ede0f5;
  --cream: #fffaf5;
  --text: #5a4a6a;
  --text-light: #9a8aaa;
  --correct: #7ddb9a;
  --radius: 24px;
  --radius-sm: 16px;
  --radius-cloud: 50px;
  --shadow: 0 8px 30px rgba(180, 150, 200, 0.2);
  --shadow-sm: 0 4px 16px rgba(180, 150, 200, 0.15);
  --shadow-hover: 0 12px 40px rgba(180, 150, 200, 0.3);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(160deg, #fce4ec 0%, #f3e5f5 25%, #e8f5e9 55%, #e3f2fd 85%, #fff8e1 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(90px + env(safe-area-inset-bottom, 0px));
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
.floating-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.floating-bg::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 200px; height: 200px;
  background: radial-gradient(circle at 40% 40%, rgba(255, 181, 194, 0.15), transparent 70%);
  border-radius: 50%;
  animation: floatAround 8s ease-in-out infinite;
}
.floating-bg::after {
  content: '';
  position: absolute; bottom: -30px; left: -30px;
  width: 180px; height: 180px;
  background: radial-gradient(circle at 60% 60%, rgba(212, 184, 232, 0.12), transparent 70%);
  border-radius: 50%;
  animation: floatAround 10s ease-in-out infinite reverse;
}
.floating-items {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.floating-items span {
  position: absolute; font-size: 16px; opacity: 0.35;
  animation: floatAround 8s ease-in-out infinite;
  image-rendering: pixelated;
}
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  overflow: hidden;
}
.stars span {
  position: absolute; color: var(--lavender); opacity: 0.15;
  font-size: 14px; animation: twinkle 3s ease-in-out infinite;
}
@keyframes floatAround {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(5deg); }
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.1); }
}

#app { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; }

.app-header {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  margin: 16px 14px 0;
  padding: 28px 20px 24px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  text-align: center;
  position: relative;
  border: 2px solid rgba(255, 181, 194, 0.3);
  overflow: visible;
}
.app-header .card-heart {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 5;
  filter: drop-shadow(0 2px 6px rgba(255, 143, 160, 0.3));
  cursor: pointer;
}
.app-header .card-heart:hover svg { filter: drop-shadow(0 0 12px rgba(255,143,160,0.5)); }
.app-header .card-heart:active svg { transform: scale(0.9); }
.app-header h1 {
  font-family: 'Press Start 2P', monospace;
  font-size: 10px; color: var(--pink-dark); line-height: 1.6;
  margin-bottom: 4px;
}
.app-header .subtitle {
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem; color: var(--text-light); font-weight: 600;
}
.lang-toggle {
  position: absolute; top: 14px; right: 14px;
  background: var(--cream);
  border: 2px solid rgba(255,181,194,0.3);
  border-radius: var(--radius-cloud);
  padding: 6px 16px;
  font-size: 10px; font-weight: 800;
  cursor: pointer; color: var(--pink-dark);
  font-family: 'Press Start 2P', monospace;
  transition: all 0.25s var(--ease-bounce);
  z-index: 2;
}
.lang-toggle:hover { background: var(--pink); color: white; border-color: var(--pink); }
.lang-toggle:active { transform: scale(0.95); }
.lang-toggle:active { transform: scale(0.95); }

.user-greeting {
  padding: 8px 18px 0;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--text); text-align: left;
}

.section { padding: 14px 14px 6px; animation: sectionIn 0.35s ease; }
@keyframes sectionIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.section-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px; color: var(--text-light);
  margin-bottom: 10px; padding: 0 4px;
  display: flex; align-items: center; gap: 6px;
}
.section-title a {
  margin-left: auto;
  font-family: 'Nunito', sans-serif;
  font-size: 0.75rem; text-decoration: none;
  color: var(--pink-dark); font-weight: 700;
  transition: all 0.2s var(--ease-bounce);
  cursor: pointer;
}
.section-title a:hover { color: var(--pink); transform: scale(1.03); }

.card {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 28px 24px;
  margin-bottom: 14px;
  border: 2px solid rgba(255, 181, 194, 0.3);
  transition: box-shadow 0.3s ease, transform 0.25s var(--ease-bounce);
  animation: cardIn 0.4s ease both;
  position: relative;
}
.card:active { transform: scale(0.98); }
.card .card-heart {
  position: absolute; top: -14px; left: 50%; transform: translateX(-50%); z-index: 3;
  filter: drop-shadow(0 2px 6px rgba(255, 143, 160, 0.3));
  cursor: pointer;
}
.card .card-heart:hover svg { filter: drop-shadow(0 0 12px rgba(255,143,160,0.5)); }
.card .card-heart:active svg { transform: scale(0.9); }
.card:nth-child(2) { animation-delay: 0.06s; }
.card:nth-child(3) { animation-delay: 0.12s; }
.card:nth-child(4) { animation-delay: 0.18s; }
.card:nth-child(5) { animation-delay: 0.24s; }
@keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

@media (hover: hover) {
  .card:hover { box-shadow: var(--shadow-hover); }
  .card-heart:hover svg { filter: drop-shadow(0 0 12px rgba(255,143,160,0.5)); }
  .lang-toggle:hover { background: var(--pink); color: white; border-color: var(--pink); }
  .section-title a:hover { color: var(--pink); }
  .btn-primary:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(255, 143, 160, 0.4); }
  .btn-outline:hover { background: var(--cream); border-color: var(--pink); color: var(--pink-dark); transform: translateY(-2px); }
  .btn-ghost:hover { background: var(--cream); }
  .card-action:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(255, 143, 160, 0.4); }
  .nav-item:hover .nav-icon { transform: scale(1.1); }
  .mood-btn:hover { transform: scale(1.15); background: white; border-color: var(--pink-light); }
  .todo-check:hover { transform: scale(1.15); }
  .diary-entry:hover { background: rgba(255,255,255,0.9); }
  .agenda-item:hover { padding-left: 4px; }
  .todo-item:hover { padding-left: 4px; }
  .more-card:hover { background: white; border-color: var(--pink); transform: translateY(-3px) scale(1.02); box-shadow: 0 6px 20px rgba(255,143,160,0.15); }
  .notif-card:hover { background: white; transform: translateX(4px); }
  .memory-item:hover { border-color: var(--pink); background: white; }
  .photo-preview:hover { filter: sepia(0.2) contrast(1) brightness(1.1) saturate(0.8); }
  .photo-grid img:hover { transform: scale(1.03); filter: sepia(0.2) contrast(1); }
}
.card-title { font-weight: 800; font-size: 0.95rem; margin-bottom: 8px; color: var(--text); }
.card-text { font-size: 0.88rem; color: var(--text-light); line-height: 1.7; }

.card-row { display: flex; align-items: center; gap: 14px; }
.card-row .card-text { flex: 1; }

.stat-row { display: flex; gap: 10px; margin: 6px 0 8px; }
.stat-pill {
  flex: 1; background: rgba(255, 255, 255, 0.6);
  border-radius: var(--radius-sm); padding: 14px 8px;
  text-align: center;
  border: 2px solid rgba(255, 181, 194, 0.15);
}
.stat-pill .num { font-family: 'Press Start 2P', monospace; font-size: 18px; color: var(--pink-dark); }
.stat-pill .label { font-size: 0.65rem; color: var(--text-light); margin-top: 4px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

.empty-state { text-align: center; padding: 24px 0; color: var(--text-light); font-size: 0.85rem; line-height: 1.8; }

.mood-selector { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; justify-content: center; }
.mood-btn {
  font-size: 1.5rem; padding: 10px 14px; min-width: 44px; min-height: 44px;
  border: 2px solid transparent; border-radius: var(--radius-sm);
  cursor: pointer; background: var(--cream);
  transition: all 0.2s var(--ease-bounce);
  display: flex; align-items: center; justify-content: center;
}
.mood-btn:hover { transform: scale(1.15); background: white; border-color: var(--pink-light); }
.mood-btn.selected { border-color: var(--pink); background: white; transform: scale(1.2); box-shadow: 0 3px 12px rgba(255,181,194,0.3); }

textarea, input[type="text"], input[type="datetime-local"] {
  width: 100%;
  padding: 14px 18px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--cream);
  border: 2px solid rgba(255, 181, 194, 0.3);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all 0.25s var(--ease-bounce);
}
textarea::placeholder, input::placeholder { color: var(--text-light); opacity: 0.6; }
textarea:focus, input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px rgba(255, 143, 160, 0.15); background: white; }
textarea { min-height: 80px; resize: vertical; }
input[type="text"] { min-height: auto; }
input[type="datetime-local"] { font-family: 'Nunito', sans-serif; font-size: 14px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 14px 32px;
  border: none;
  border-radius: var(--radius-cloud);
  font-size: 0.85rem;
  font-weight: 800;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  transition: all 0.25s var(--ease-bounce);
  text-decoration: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  color: white;
  box-shadow: 0 6px 20px rgba(255, 143, 160, 0.3);
}
.btn-primary:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(255, 143, 160, 0.4); }
.btn-primary:active { transform: translateY(0) scale(0.97); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-outline {
  background: transparent;
  border: 2px solid rgba(255, 181, 194, 0.4);
  color: var(--text-light);
  box-shadow: none;
}
.btn-outline:hover { background: var(--cream); border-color: var(--pink); color: var(--pink-dark); transform: translateY(-2px); }
.btn-ghost { background: transparent; border: none; color: var(--text-light); box-shadow: none; }
.btn-ghost:hover { background: var(--cream); transform: none; }

.card-action {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 12px;
  padding: 12px 28px;
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  color: white; border: none;
  border-radius: var(--radius-cloud);
  font-weight: 800;
  font-size: 0.85rem;
  font-family: 'Nunito', sans-serif;
  cursor: pointer;
  transition: all 0.25s var(--ease-bounce);
  box-shadow: 0 6px 20px rgba(255, 143, 160, 0.3);
  text-decoration: none;
}
.card-action:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 30px rgba(255, 143, 160, 0.4); }
.card-action:active { transform: translateY(0) scale(0.97); }
.card-action.small { padding: 10px 22px; font-size: 0.78rem; }
.answer-option { display: block; width: 100%; margin-top: 8px; padding: 14px 20px; background: var(--cream); border: 2px solid rgba(255, 181, 194, 0.25); border-radius: var(--radius-sm); font-weight: 700; font-size: 0.85rem; font-family: 'Nunito', sans-serif; color: var(--text); cursor: pointer; transition: all 0.2s var(--ease-bounce); text-align: center; }
.answer-option:active { transform: scale(0.97); background: white; border-color: var(--pink); }

.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  border-top: 2px solid rgba(255, 181, 194, 0.2);
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px)) 0;
  z-index: 100;
  max-width: 520px;
  margin: 0 auto;
}
.nav-item {
  flex: 1; text-align: center; padding: 6px 2px;
  cursor: pointer; color: var(--text-light);
  font-family: 'Press Start 2P', monospace;
  font-size: 7px; font-weight: 400;
  transition: all 0.2s var(--ease-bounce);
  position: relative;
  min-height: 44px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.nav-item .nav-icon { font-size: 1.3rem; display: block; margin-bottom: 2px; transition: all 0.2s var(--ease-bounce); }
.nav-item.active { color: var(--pink-dark); }
.nav-item.active .nav-icon { transform: scale(1.15); }
.nav-item:hover .nav-icon { transform: scale(1.1); }
.nav-item.active::after {
  content: '';
  position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
  width: 30px; height: 3px;
  background: linear-gradient(135deg, var(--pink), var(--pink-dark));
  border-radius: 0 0 4px 4px;
}
.settings-btn { flex: 0.5; min-width: 44px; }
.settings-btn .nav-icon { font-size: 1.2rem; margin-bottom: 0; }
.settings-btn.active::after { width: 20px; }

.diary-entry {
  border-left: 3px solid var(--pink);
  padding: 14px 16px; margin-bottom: 10px;
  background: var(--cream);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  transition: all 0.2s ease;
}
.diary-entry:hover { background: rgba(255,255,255,0.9); }
.diary-entry .meta { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-light); margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
.diary-entry .content { font-size: 0.9rem; line-height: 1.7; white-space: pre-line; }

.challenge-box { text-align: center; padding: 20px 8px; }
.challenge-type-badge {
  display: inline-block; padding: 4px 16px;
  border-radius: var(--radius-cloud);
  font-family: 'Press Start 2P', monospace;
  font-size: 8px; font-weight: 400;
  background: var(--lavender-light);
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.challenge-word {
  font-family: 'Press Start 2P', monospace;
  font-size: 1.5rem; letter-spacing: 10px;
  padding: 20px;
  background: var(--cream);
  border-radius: var(--radius-sm);
  display: inline-block; margin: 14px 0;
  color: var(--text);
  overflow-wrap: break-word; word-break: break-word;
}
.challenge-riddle { font-size: 1rem; font-style: italic; padding: 18px 14px; line-height: 1.7; color: var(--text); }

.agenda-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255, 181, 194, 0.12);
  transition: all 0.2s ease;
}
.agenda-item:last-child { border: none; }
.agenda-item:hover { padding-left: 4px; }
.agenda-date { min-width: 48px; text-align: center; }
.agenda-date .day { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--text); line-height: 1; }
.agenda-date .mon { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-light); margin-top: 3px; }
.agenda-info { flex: 1; }
.agenda-info .title { font-weight: 700; font-size: 0.88rem; }
.agenda-info .desc { font-size: 0.78rem; color: var(--text-light); margin-top: 4px; line-height: 1.5; }

.todo-item {
  display: flex; gap: 12px; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255, 181, 194, 0.08);
  transition: all 0.2s ease;
}
.todo-item:last-child { border: none; }
.todo-item:hover { padding-left: 4px; }
.todo-check {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 2px solid var(--pink);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 1.1rem;
  transition: all 0.2s var(--ease-bounce);
  background: var(--cream);
  color: transparent;
}
.todo-check.done { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: white; border-color: transparent; }
.todo-check:hover { transform: scale(1.15); }
.todo-content { flex: 1; }
.todo-content .title { font-weight: 600; font-size: 0.88rem; }
.todo-content .title.done-text { text-decoration: line-through; color: var(--text-light); }
.todo-content .meta { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-light); margin-top: 3px; }

.add-form { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }

.review-box {
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 18px; margin-bottom: 14px;
  border: 2px solid rgba(255, 181, 194, 0.15);
}
.review-box .review-header { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--text-light); margin-bottom: 8px; }
.review-box .review-text { font-size: 0.9rem; line-height: 1.7; color: var(--text); white-space: pre-line; padding: 12px 16px; background: white; border-radius: var(--radius-sm); }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(255, 250, 245, 0.88);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 0;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 28px 24px calc(24px + env(safe-area-inset-bottom, 12px));
  width: 100%; max-width: 520px; max-height: 80vh;
  overflow-y: auto;
  animation: modalUp 0.35s var(--ease-bounce);
  border-top: 2px solid rgba(255, 181, 194, 0.3);
}
@keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.hidden { display: none !important; }

.more-card {
  background: rgba(255,255,255,0.6);
  border: 2px solid rgba(255,181,194,0.15);
  border-radius: var(--radius-sm);
  padding: 18px 12px;
  cursor: pointer;
  transition: all 0.25s var(--ease-bounce);
  text-align: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.more-card:hover { background: white; border-color: var(--pink); transform: translateY(-3px) scale(1.02); box-shadow: 0 6px 20px rgba(255,143,160,0.15); }
.more-card:active { transform: scale(0.97); }

.loading { text-align: center; padding: 60px 20px; color: var(--text-light); display: flex; flex-direction: column; align-items: center; gap: 14px; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255, 181, 194, 0.2); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

/* New challenge styles */
.challenge-theme { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--lavender); margin-bottom:6px; }
.challenge-question { font-size:1rem; font-weight:700; padding:16px; background:var(--cream); border-radius:var(--radius-sm); margin:10px 0; line-height:1.6; }
.challenge-answer { font-size:0.9rem; padding:14px; background:var(--cream); border-radius:var(--radius-sm); margin:8px 0; border-left:3px solid var(--pink); }
.notif-dot { position:absolute; top:-2px; right:-4px; width:8px; height:8px; background:var(--pink-dark); border-radius:50%; border:2px solid white; }
.notif-card { background:var(--cream); border-radius:var(--radius-sm); padding:14px; margin-bottom:10px; border-left:3px solid var(--pink); cursor:pointer; transition:all 0.2s ease; }
.notif-card:hover { background:white; transform:translateX(4px); }
.notif-card .notif-title { font-weight:700; font-size:0.85rem; }
.notif-card .notif-meta { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--text-light); margin-top:4px; }
.memory-item { padding:14px; margin-bottom:10px; background:var(--cream); border-radius:var(--radius-sm); border:2px solid rgba(255,181,194,0.15); transition:all 0.2s ease; }
.memory-item:hover { border-color:var(--pink); background:white; }
.memory-item .memory-date { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--text-light); }
.memory-item .memory-q { font-weight:700; font-size:0.85rem; margin:6px 0 4px; }
.memory-item .memory-a { font-size:0.85rem; color:var(--text-light); line-height:1.6; }

.photo-preview {
  max-width:100%; border-radius:var(--radius-sm);
  margin:10px 0; box-shadow:var(--shadow);
  filter: sepia(0.3) contrast(0.9) brightness(1.05) saturate(0.7);
  image-rendering:pixelated;
}
.photo-preview:hover { filter: sepia(0.2) contrast(1) brightness(1.1) saturate(0.8); }
.photo-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
.photo-grid img { width:100%; border-radius:var(--radius-sm); aspect-ratio:1; object-fit:cover;
  filter: sepia(0.3) contrast(0.9) brightness(1.05);
  box-shadow:var(--shadow-sm); cursor:pointer;
  transition:all 0.25s var(--ease-bounce);
}
.photo-grid img:hover { transform:scale(1.03); filter: sepia(0.2) contrast(1); }

@media (max-width: 600px) {
  .app-header { margin: 12px 10px 0; padding: 24px 16px 20px; }
  .app-header h1 { font-size: 9px; }
  .app-header .subtitle { font-size: 0.8rem; }
  .section { padding: 10px 10px 4px; }
  .card { padding: 22px 18px; }
  .nav-item { font-size: 7px; min-height: 40px; padding: 4px 2px; }
  .nav-item .nav-icon { font-size: 1.2rem; }
  .stat-pill { padding: 10px 6px; }
  .stat-pill .num { font-size: 14px; }
  .stat-row { gap: 6px; }
  .challenge-word { font-size: 1.2rem; letter-spacing: 6px; padding: 14px; }
}
@media (max-width: 400px) {
  .app-header { margin: 8px 6px 0; padding: 20px 12px 16px; }
  .app-header h1 { font-size: 8px; }
  .card { padding: 18px 14px; border-radius: var(--radius-sm); }
  .section { padding: 8px 6px 2px; }
  .nav-item { font-size: 7px; min-height: 36px; padding: 2px 1px; }
  .nav-item .nav-icon { font-size: 1rem; }
  .challenge-word { font-size: 1rem; letter-spacing: 4px; padding: 10px; }
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(30px) scale(0.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  .floating-items, .stars { display: none; }
}
</style>
</head>
<body>
<div class="floating-bg"></div>
<div class="floating-items" id="floatingItems"></div>
<div class="stars" id="stars"></div>

<div id="app">
  <div class="app-header">
    <div class="card-heart">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 24.5L5.25 15.75C3.25 13.75 2.5 10.5 4.5 7.75C6.5 5 10 4.5 12.5 7L14 8.5L15.5 7C18 4.5 21.5 5 23.5 7.75C25.5 10.5 24.75 13.75 22.75 15.75L14 24.5Z"
          fill="url(#heartGrad)" stroke="var(--pink-dark)" stroke-width="0.8"/>
        <defs><linearGradient id="heartGrad" x1="14" y1="4.5" x2="14" y2="24.5"><stop stop-color="var(--pink)"/><stop offset="1" stop-color="var(--pink-dark)"/></linearGradient></defs>
      </svg>
    </div>
    <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
    <h1>✨ Still Learning ✨</h1>
    <div class="subtitle" id="headerSub">Aprendendo um com o outro, um dia de cada vez 💕</div>
  </div>
  <div id="userGreeting" class="user-greeting"></div>
  <div id="mainContent"></div>
</div>

<div class="nav-bar" id="navBar">
  <div class="nav-item active" data-nav="today" onclick="showSection('today')"><span class="nav-icon">🏠</span>Hoje</div>
  <div class="nav-item" data-nav="us" onclick="showSection('us')"><span class="nav-icon">💑</span>Nós</div>
  <div class="nav-item settings-btn" data-nav="settings" onclick="toggleSettings()"><span class="nav-icon">⚙️</span></div>
</div>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-box" style="text-align:center;">
    <div class="card-heart" style="position:static;margin:0 auto 10px;transform:none;">
      <svg width="24" height="24" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 24.5L5.25 15.75C3.25 13.75 2.5 10.5 4.5 7.75C6.5 5 10 4.5 12.5 7L14 8.5L15.5 7C18 4.5 21.5 5 23.5 7.75C25.5 10.5 24.75 13.75 22.75 15.75L14 24.5Z"
          fill="url(#mh1)" stroke="var(--pink-dark)" stroke-width="0.8"/>
        <defs><linearGradient id="mh1" x1="14" y1="4.5" x2="14" y2="24.5"><stop stop-color="var(--pink)"/><stop offset="1" stop-color="var(--pink-dark)"/></linearGradient></defs>
      </svg>
    </div>
    <div style="font-family:'Press Start 2P',monospace;font-size:9px;color:var(--text);margin-bottom:16px;">Still Learning</div>
    <div style="display:grid;grid-template-columns:1fr;gap:10px;max-width:200px;margin:0 auto;">
      <div class="more-card" onclick="toggleLang()">
        <div style="font-size:1.5rem;">🌐</div>
        <div style="font-weight:700;font-size:0.85rem;margin-top:4px;" data-i18n-setting="language">Idioma</div>
        <div style="font-size:0.7rem;color:var(--text-light);margin-top:2px;" id="settingsLangLabel">🇧🇷 Português</div>
      </div>
      <div class="more-card" onclick="logout(event)">
        <div style="font-size:2rem;">🚪</div>
        <div style="font-weight:700;font-size:0.85rem;margin-top:4px;" data-i18n-setting="logout">Sair</div>
        <div style="font-size:0.7rem;color:var(--text-light);margin-top:2px;" data-i18n-setting="disconnect">Desconectar</div>
      </div>
    </div>
  </div>
</div>

<script>
const _t = {};
const _lang = 'pt';
const COUPLE_ID = localStorage.getItem('couple_id') || '';
const USER_NAME = localStorage.getItem('user_name') || '';
const USER_DISPLAY = localStorage.getItem('user_display') || '';
const PARTNER_NAME = localStorage.getItem('partner_name') || '';
let state = { section: 'today', data: {} };

function initDecorations() {
  const isMobile = window.innerWidth <= 600;
  const emojis = ['💕', '❤️', '💗', '💖', '❤️‍🔥', '🐱', '🐰', '🐶', '🦊', '🐼', '🌸', '✨'];
  const items = document.getElementById('floatingItems');
  const bgCount = isMobile ? 4 : 8;
  for (let i = 0; i < bgCount; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[i % emojis.length];
    span.style.left = (8 + Math.random() * 80) + '%';
    span.style.top = (8 + Math.random() * 80) + '%';
    span.style.fontSize = (isMobile ? 8 + Math.random() * 6 : 12 + Math.random() * 12) + 'px';
    span.style.animationDelay = (Math.random() * 5) + 's';
    span.style.animationDuration = (8 + Math.random() * 6) + 's';
    items.appendChild(span);
  }
  // Stars
  const stars = document.getElementById('stars');
  const starChars = ['✦', '★', '✧'];
  const starCount = isMobile ? 4 : 10;
  for (let i = 0; i < starCount; i++) {
    const span = document.createElement('span');
    span.textContent = starChars[i % starChars.length];
    span.style.left = (10 + Math.random() * 80) + '%';
    span.style.top = (10 + Math.random() * 80) + '%';
    span.style.fontSize = (10 + Math.random() * 6) + 'px';
    span.style.animationDelay = (Math.random() * 4) + 's';
    span.style.animationDuration = (3 + Math.random() * 4) + 's';
    stars.appendChild(span);
  }
}

function loadUsSection() {
  const isEn = getLang() === 'en';
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="section">
      <h2 class="section-title">${isEn ? '💑 Us' : '💑 Nós'}</h2>
      <p style="text-align:center;color:var(--text-light);font-size:0.8rem;margin-bottom:20px;">${isEn ? 'Our shared memories and moments' : 'Nossas memórias e momentos compartilhados'}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:0 auto;">
        <div class="more-card" onclick="showSection('diary')">
          <div style="font-size:2.5rem;">📖</div>
          <div style="font-weight:700;font-size:0.9rem;margin-top:6px;">${isEn ? 'Diary' : 'Diário'}</div>
          <div style="font-size:0.7rem;color:var(--text-light);margin-top:4px;">${isEn ? 'Our daily entries' : 'Nossas entradas diárias'}</div>
        </div>
        <div class="more-card" onclick="showSection('memories')">
          <div style="font-size:2.5rem;">✨</div>
          <div style="font-weight:700;font-size:0.9rem;margin-top:6px;">${isEn ? 'Memories' : 'Memórias'}</div>
          <div style="font-size:0.7rem;color:var(--text-light);margin-top:4px;">${isEn ? 'Photos & mixed memories' : 'Fotos e memórias mistas'}</div>
        </div>
        <div class="more-card" onclick="showSection('quiz')">
          <div style="font-size:2.5rem;">❓</div>
          <div style="font-weight:700;font-size:0.9rem;margin-top:6px;">${isEn ? 'Quiz' : 'Quiz'}</div>
          <div style="font-size:0.7rem;color:var(--text-light);margin-top:4px;">${isEn ? 'Test your knowledge' : 'Teste seu conhecimento'}</div>
        </div>
        <div class="more-card" onclick="showSection('challenge')">
          <div style="font-size:2.5rem;">🎯</div>
          <div style="font-weight:700;font-size:0.9rem;margin-top:6px;">${isEn ? 'Challenge' : 'Desafio'}</div>
          <div style="font-size:0.7rem;color:var(--text-light);margin-top:4px;">${isEn ? 'Current challenge' : 'Desafio atual'}</div>
        </div>
      </div>
    </div>
  `;
}

async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  const token = localStorage.getItem('auth_token');
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (COUPLE_ID) opts.headers['X-Couple-Id'] = COUPLE_ID;
  if (USER_NAME) opts.headers['X-User-Name'] = USER_NAME;
  if (PARTNER_NAME) opts.headers['X-Partner-Name'] = PARTNER_NAME;
  if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
  opts.headers['Content-Type'] = 'application/json';
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Request failed'); }
  return r.json();
}

function toggleLang() {
  sessionStorage.setItem('lang_section', state.section || 'today');
  document.cookie = 'lang=' + (getLang() === 'pt' ? 'en' : 'pt') + ';path=/;max-age=31536000';
  location.reload();
}
function getLang() { const m = document.cookie.match(/lang=([^;]+)/); return m ? m[1] : 'pt'; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function logout(e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  try { localStorage.clear(); } catch(_) {}
  window.location.href = '/';
}

function updateNavLang() {
  const isEn = getLang() === 'en';
  document.getElementById('langBtn').textContent = isEn ? 'PT' : 'EN';
  document.getElementById('headerSub').textContent = isEn ? 'Learning each other, one day at a time 💕' : 'Aprendendo um com o outro, um dia de cada vez 💕';
  document.querySelectorAll('[data-nav]').forEach(el => {
    const nav = el.dataset.nav;
    if (nav === 'settings') return;
    const labels = { today: isEn ? 'Today' : 'Hoje', us: isEn ? 'Us' : 'Nós' };
    el.childNodes[el.childNodes.length - 1].textContent = labels[nav] || nav;
  });
  document.getElementById('settingsLangLabel').textContent = isEn ? '🇺🇸 English' : '🇧🇷 Português';
  document.querySelectorAll('[data-i18n-setting]').forEach(el => {
    const key = el.dataset.i18nSetting;
    const labels = { language: isEn ? 'Language' : 'Idioma', logout: isEn ? 'Log out' : 'Sair', disconnect: isEn ? 'Disconnect' : 'Desconectar' };
    el.textContent = labels[key] || key;
  });
}
function toggleSettings() { document.getElementById('settingsModal').classList.toggle('show'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
// Safari touch guard for modal overlay
document.addEventListener('DOMContentLoaded', function() {
  var mm = document.getElementById('settingsModal');
  if (mm) { mm.addEventListener('touchstart', function(e) { if (e.target === this) closeSettings(); }, {passive:true}); }
});

function backLink() {
  const isEn = getLang() === 'en';
  return `<button onclick="showSection('today')" style="margin-left:auto;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--pink-dark);background:none;border:none;cursor:pointer;transition:all 0.2s var(--ease-bounce);display:flex;align-items:center;gap:4px;padding:8px 4px;">← ${isEn ? 'Back' : 'Voltar'}</button>`;
}

function showSection(name) {
  state.section = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.nav === name));
  closeSettings();
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">${getLang() === 'en' ? 'Loading...' : 'Carregando...'}</div></div>`;
  if (name === 'today') loadDashboard();
  else if (name === 'us') loadUsSection();
  else if (name === 'question') loadQuestion();
  else if (name === 'diary') loadDiary();
  else if (name === 'challenge') loadChallenge();
  else if (name === 'agenda') loadAgenda();
  else if (name === 'todos') loadTodos();
  else if (name === 'review') loadReview();
  else if (name === 'quote') loadQuote();
  else if (name === 'memories') loadMemories();
  else if (name === 'quiz') loadQuiz();
}

function monthsPt(m) { return ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][m]; }
function monthsEn(m) { return ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]; }

function loadDashboard() {
  const main = document.getElementById('mainContent');
  const u = USER_DISPLAY || USER_NAME;
  const isEn = getLang() === 'en';
  api('/api/couple/dashboard').then(d => {
    let html = `<div class="section">`;

    html += `<div class="card">
      <div class="card-heart">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 24.5L5.25 15.75C3.25 13.75 2.5 10.5 4.5 7.75C6.5 5 10 4.5 12.5 7L14 8.5L15.5 7C18 4.5 21.5 5 23.5 7.75C25.5 10.5 24.75 13.75 22.75 15.75L14 24.5Z" fill="url(#h1)" stroke="var(--pink-dark)" stroke-width="0.8"/>
          <defs><linearGradient id="h1" x1="14" y1="4.5" x2="14" y2="24.5"><stop stop-color="var(--pink)"/><stop offset="1" stop-color="var(--pink-dark)"/></linearGradient></defs>
        </svg>
      </div>
      <div style="font-size:1.15rem;font-weight:800;margin-top:4px;">${isEn ? 'Hello' : 'Olá'}, ${esc(u)} 💕</div>
      <div class="card-text" style="margin-top:4px;">${isEn ? 'What shall we do today?' : 'O que vamos fazer hoje?'}</div>
    </div>`;

    html += `<div class="stat-row">
      <div class="stat-pill"><div class="num">${d.diary_count || 0}</div><div class="label">${isEn ? 'Diary' : 'Diário'}</div></div>
      <div class="stat-pill"><div class="num">${d.challenge?.exists ? (d.challenge.done ? '✓' : '!') : '—'}</div><div class="label">${isEn ? 'Challenge' : 'Desafio'}</div></div>
      <div class="stat-pill"><div class="num">${(d.todos||[]).filter(t=>!t.done).length}</div><div class="label">${isEn ? 'To-dos' : 'Tarefas'}</div></div>
    </div>`;

    html += `<div class="card"><div class="card-row">
      <span style="font-size:1.8rem;">💭</span>
      <div class="card-text">
        <strong>${isEn ? 'Daily Question' : 'Pergunta do Dia'}</strong><br>
        ${d.question && d.question.exists
          ? (isEn ? (d.question.my_answer ? 'Answered ✅' : 'Waiting for your answer 💭') : (d.question.my_answer ? 'Respondida ✅' : 'Aguardando sua resposta 💭'))
          : (isEn ? 'No question for today' : 'Nenhuma pergunta hoje')}
      </div>
    </div>
    <button class="card-action" onclick="showSection('question')">
      ${d.question?.my_answer ? (isEn ? 'View 💕' : 'Ver 💕') : (isEn ? 'Answer 💭' : 'Responder 💭')}
    </button></div>`;

    html += `<div class="card"><div class="card-row">
      <span style="font-size:1.8rem;">📖</span>
      <div class="card-text">
        <strong>${isEn ? 'Our Diary' : 'Nosso Diário'}</strong><br>
        ${d.diary_count > 0 ? (isEn ? `${d.diary_count} entry today` : `${d.diary_count} registro hoje`) : (isEn ? 'No entries yet' : 'Nenhum registro ainda')}
      </div>
    </div>
    <button class="card-action" onclick="showSection('diary')">📝 ${isEn ? 'Write' : 'Escrever'}</button>
    ${d.diary_partner_today ? `<button class="card-action" onclick="showSection('diary')" style="margin-top:6px;">👀 ${isEn ? "View partner's" : 'Ver parceiro'}</button>` : ''}
    </div>`;

    html += `<div class="card"><div class="card-row" style="position:relative;">
      <span style="font-size:1.8rem;">🎯</span>
      <div class="card-text">
        <strong>${isEn ? "Today's Challenge" : 'Desafio de Hoje'}</strong><br>
        ${d.challenge?.exists
          ? (d.challenge.done
            ? (isEn ? 'Completed ✅' : 'Completado ✅')
            : (isEn ? `Type: ${d.challenge.type}` : `Tipo: ${d.challenge.type}`))
          : (isEn ? 'No challenge today' : 'Nenhum desafio hoje')}
      </div>
      ${d.challenge?.exists && d.challenge.type === 'partner_question' && d.challenge.partner_answered && !d.challenge.my_answered ? '<span class="notif-dot" style="top:2px;right:0;"></span>' : ''}
    </div>
    <button class="card-action" onclick="showSection('challenge')">🎯 ${isEn ? 'Start' : 'Começar'}</button></div>`;

    // Quote card
    html += `<div class="card" id="dashQuoteCard">
      <div class="card-row">
        <span style="font-size:1.8rem;">💌</span>
        <div class="card-text">
          <strong>${isEn ? "Today's Quote" : 'Citação do Dia'}</strong><br>
          <span id="dashQuoteText" style="font-size:0.82rem;">${isEn ? 'Loading...' : 'Carregando...'}</span>
        </div>
      </div>
      <button class="card-action" onclick="showSection('quote')">💌 ${isEn ? 'Read' : 'Ler'}</button>
    </div>`;

    // Notifications section
    if (d.notifications && d.notifications.length) {
      html += `<div class="card">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
          <span style="font-size:1.2rem;">🔔</span>
          <span style="font-weight:800;font-size:0.9rem;">${isEn ? 'Notifications' : 'Notificações'}</span>
          <span style="background:var(--pink-dark);color:white;border-radius:20px;padding:2px 10px;font-family:'Press Start 2P',monospace;font-size:7px;">${d.notifications.length}</span>
        </div>`;
      d.notifications.forEach(n => {
        const msg = isEn ? (n.msg_en || n.msg_pt || '') : (n.msg_pt || n.msg_en || '');
        const emojiMap = { daily_answer: '💭', partner_challenge_resp: '💪', question_answered: '💌' };
        const emoji = emojiMap[n.type] || '🔔';
        html += `<div class="notif-card">
          <div class="notif-title">${emoji} ${esc(msg)}</div>
        </div>`;
      });
      html += `</div>`;
    }

    const hasEvents = d.events && d.events.length;
    html += `<div class="card"><div class="card-row">
      <span style="font-size:1.8rem;">📅</span>
      <div class="card-text">
        <strong>${isEn ? 'Upcoming Events' : 'Próximos Eventos'}</strong><br>
        ${hasEvents ? d.events.slice(0,2).map(e => esc(e.title)).join(', ') + (d.events.length > 2 ? ` +${d.events.length-2}` : '') : (isEn ? 'Nothing scheduled' : 'Nada agendado')}
      </div>
    </div>
    <button class="card-action small" onclick="showSection('agenda')" style="margin-top:8px;">📅 ${isEn ? 'View' : 'Ver'}</button>
    ${(d.todos && d.todos.length) ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,181,194,0.15);">
      <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);margin-bottom:6px;">📋 ${isEn ? 'To-Dos' : 'Tarefas'}</div>
      ${d.todos.slice(0,3).map(t => `<div class="todo-item" style="padding:6px 0;border:none;"><div class="todo-check ${t.done ? 'done' : ''}" style="width:20px;height:20px;font-size:0.6rem;">${t.done ? '✓' : ''}</div><div class="todo-content"><div class="title ${t.done ? 'done-text' : ''}" style="font-size:0.82rem;">${esc(t.title)}</div></div></div>`).join('')}
      ${d.todos.length > 3 ? `<div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);text-align:center;padding-top:6px;">+${d.todos.length - 3} ${isEn ? 'more' : 'mais'}</div>` : ''}
    </div>` : ''}
    </div>`;

    html += `</div>`;
    main.innerHTML = html;

    // Fetch quote inline
    api('/api/couple/quote').then(qd => {
      const el = document.getElementById('dashQuoteText');
      if (el) {
        if (qd.exists) {
          const q = qd.data;
          const text = isEn ? (q.quote_en || q.quote_pt || '') : (q.quote_pt || q.quote_en || '');
          el.textContent = text.length > 60 ? text.slice(0, 60) + '…' : text;
        } else {
          el.textContent = isEn ? 'No quote today' : 'Nenhuma citação hoje';
        }
      }
    }).catch(() => {
      const el = document.getElementById('dashQuoteText');
      if (el) el.textContent = isEn ? 'No quote today' : 'Nenhuma citação hoje';
    });
  }).catch(e => {
    main.innerHTML = `<div class="empty-state" style="padding:60px;">${esc(e.message)}</div>`;
  });
}

function loadQuestion() {
  const main = document.getElementById('mainContent');
  const isEn = getLang() === 'en';
  api('/api/couple/question').then(d => {
    if (!d.exists) {
      main.innerHTML = `<div class="section"><div class="card"><div class="empty-state">💭 ${isEn ? 'No question for today yet. Check back later!' : 'Nenhuma pergunta para hoje ainda. Volte mais tarde!'}</div></div></div>`;
      return;
    }
    const q = esc(d.question);
    let html = `<div class="section"><div class="section-title">${isEn ? "Today's Question" : 'Pergunta de Hoje'}${backLink()}</div>`;
    html += `<div class="card"><div class="card-heart">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 24.5L5.25 15.75C3.25 13.75 2.5 10.5 4.5 7.75C6.5 5 10 4.5 12.5 7L14 8.5L15.5 7C18 4.5 21.5 5 23.5 7.75C25.5 10.5 24.75 13.75 22.75 15.75L14 24.5Z" fill="url(#hq)" stroke="var(--pink-dark)" stroke-width="0.8"/>
        <defs><linearGradient id="hq" x1="14" y1="4.5" x2="14" y2="24.5"><stop stop-color="var(--pink)"/><stop offset="1" stop-color="var(--pink-dark)"/></linearGradient></defs>
      </svg>
    </div>`;
    html += `<div style="font-size:0.9rem;line-height:1.7;margin:4px 0 4px;font-weight:600;">${q}</div>`;

    if (!d.my_answer) {
      html += `<textarea id="qAnswer" rows=3 placeholder="${isEn ? 'Write your answer...' : 'Escreva sua resposta...'}" style="margin-top:12px;"></textarea>`;
      html += `<button class="card-action" onclick="submitAnswer()" style="margin-top:12px;">💕 ${isEn ? 'Send' : 'Enviar'}</button>`;
    } else {
      html += `<div style="margin-top:16px;padding:14px;background:var(--cream);border-radius:var(--radius-sm);border-left:3px solid var(--pink);">
        <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);margin-bottom:6px;">${isEn ? 'Your answer' : 'Sua resposta'}</div>
        <div style="font-size:0.9rem;line-height:1.6;">${esc(d.my_answer)}</div></div>`;
      if (d.partner_answer) {
        html += `<div style="margin-top:12px;padding:14px;background:rgba(212,184,232,0.08);border-radius:var(--radius-sm);border-left:3px solid var(--lavender);">
          <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);margin-bottom:6px;">${esc(d.partner_name)} ${isEn ? 'answered' : 'respondeu'}</div>
          <div style="font-size:0.9rem;line-height:1.6;">${esc(d.partner_answer)}</div></div>`;
      } else {
        html += `<div class="empty-state">⏳ ${isEn ? 'Waiting for' : 'Aguardando'} ${esc(d.partner_name)}...</div>`;
      }
    }
    html += `</div></div>`;
    main.innerHTML = html;
  }).catch(e => {
    main.innerHTML = `<div class="empty-state">${esc(e.message)}</div>`;
  });
}

async function submitAnswer() {
  const answer = document.getElementById('qAnswer')?.value?.trim();
  if (!answer) return;
  const isEn = getLang() === 'en';
  try {
    await api('/api/couple/question/answer', { method: 'POST', body: { couple_id: COUPLE_ID, name: USER_NAME, answer } });
    showToast(isEn ? 'Answer sent! 💕' : 'Resposta enviada! 💕');
    loadQuestion();
  } catch(e) { showToast(e.message, true); }
}

function loadDiary() {
  const main = document.getElementById('mainContent');
  const isEn = getLang() === 'en';
  api('/api/couple/diary').then(d => {
    let html = `<div class="section"><div class="section-title">📖 ${isEn ? 'Our Diary' : 'Nosso Diário'}${backLink()}</div>`;

    html += `<div class="card"><div class="card-heart">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 24.5L5.25 15.75C3.25 13.75 2.5 10.5 4.5 7.75C6.5 5 10 4.5 12.5 7L14 8.5L15.5 7C18 4.5 21.5 5 23.5 7.75C25.5 10.5 24.75 13.75 22.75 15.75L14 24.5Z" fill="url(#hd)" stroke="var(--pink-dark)" stroke-width="0.8"/>
        <defs><linearGradient id="hd" x1="14" y1="4.5" x2="14" y2="24.5"><stop stop-color="var(--pink)"/><stop offset="1" stop-color="var(--pink-dark)"/></linearGradient></defs>
      </svg>
    </div>`;
    html += `<div class="card-title">${isEn ? 'How are you feeling?' : 'Como você está?'}</div>`;
    html += `<div class="mood-selector" id="moodSelector">${['😊','🥰','😢','😤','😴','🤗','😐','🔥'].map(m => `<span class="mood-btn" data-mood="${m}" onclick="selectMood(this)">${m}</span>`).join('')}</div>`;
    html += `<textarea id="diaryContent" rows=4 placeholder="${isEn ? 'Write about your day...' : 'Escreva sobre o seu dia...'}">${esc(d.my_today?.content || '')}</textarea>`;
    html += `<button class="card-action" onclick="saveDiary()" style="margin-top:12px;">💕 ${isEn ? 'Save' : 'Salvar'}</button>`;
    html += `</div>`;

    if (d.partner_today) {
      html += `<div class="card"><div class="card-title">${esc(d.partner_name)} ${isEn ? 'wrote' : 'escreveu'}:</div>
        <div class="diary-entry"><div class="meta">${d.partner_today.mood || ''} ${d.partner_today.date}</div>
        <div class="content">${esc(d.partner_today.content)}</div></div></div>`;
    } else {
      html += `<div class="card"><div class="empty-state">⏳ ${isEn ? 'Waiting for' : 'Aguardando'} ${esc(d.partner_name)} ${isEn ? 'to write today...' : 'escrever hoje...'}</div></div>`;
    }

    const past = d.past || [];
    if (past.length) {
      html += `<div class="card"><div class="card-title">📜 ${isEn ? 'Past Days' : 'Dias anteriores'}</div>`;
      past.slice(0, 10).forEach(e => {
        const author = e.author_id === USER_NAME ? (isEn ? 'You' : 'Você') : esc(d.partner_name || e.author_id);
        html += `<div class="diary-entry"><div class="meta">${author} · ${e.date} ${e.mood || ''}</div><div class="content">${esc(e.content)}</div></div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
    main.innerHTML = html;
  });
}

let selectedMood = '';
function selectMood(el) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedMood = el.dataset.mood;
}

async function saveDiary() {
  const content = document.getElementById('diaryContent')?.value?.trim();
  if (!content) return;
  const isEn = getLang() === 'en';
  try {
    await api('/api/couple/diary/save', { method: 'POST', body: { couple_id: COUPLE_ID, author_id: USER_NAME, content, mood: selectedMood } });
    showToast(isEn ? 'Diary saved! 💕' : 'Diário salvo! 💕');
    loadDiary();
  } catch(e) { showToast(e.message, true); }
}

function loadChallenge() {

let _photosData = [];

// ── Camera capture (getUserMedia) ──
let _cameraStream = null;
let _cameraFacing = 'environment';
let _capturedDataUrl = null;

function stopCamera() {
  if (_cameraStream) {
    _cameraStream.getTracks().forEach(function(t) { t.stop(); });
    _cameraStream = null;
  }
}

function toggleCamera() {
  _cameraFacing = _cameraFacing === 'environment' ? 'user' : 'environment';
  const container = document.querySelector('.camera-overlay');
  if (container) {
    _startCameraStream(container);
  }
}

function _startCameraStream(container) {
  const isEn = getLang() === 'en';
  const video = document.getElementById('camViewfinder');
  if (!video) return;
  stopCamera();
  video.style.transform = 'scaleX(' + (_cameraFacing === 'user' ? '-1' : '1') + ')';
  navigator.mediaDevices.getUserMedia({ video: { facingMode: _cameraFacing, width: { ideal: 480 }, height: { ideal: 640 } }, audio: false })
    .then(function(stream) {
      _cameraStream = stream;
      video.srcObject = stream;
    })
    .catch(function() {
      container.innerHTML = '<div style="color:var(--danger);padding:12px;">⚠️ ' + (isEn ? 'Camera access denied' : 'Acesso à câmera negado') + '</div>';
    });
}

function openCamera(containerId, onCapture) {
  stopCamera();
  _capturedDataUrl = null;
  const container = document.getElementById(containerId);
  if (!container) return;
  const isEn = getLang() === 'en';
  container.innerHTML =
    '<div class="camera-overlay" style="text-align:center;">' +
      '<div style="position:relative;">' +
        '<video id="camViewfinder" autoplay playsinline style="width:100%;max-height:55vh;border-radius:12px;background:#000;transform:scaleX(' + (_cameraFacing === 'user' ? '-1' : '1') + ');"></video>' +
        '<button id="camFlipBtn" onclick="toggleCamera()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.4);color:white;border:none;border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">🔄</button>' +
      '</div>' +
      '<div style="display:flex;gap:12px;justify-content:center;margin-top:10px;flex-wrap:wrap;">' +
        '<button class="card-action" id="camCaptureBtn">📸 ' + (isEn ? 'Capture' : 'Capturar') + '</button>' +
        '<button class="btn btn-ghost" id="camCancelBtn">' + (isEn ? 'Cancel' : 'Cancelar') + '</button>' +
      '</div>' +
      '<div id="camPreview" style="margin-top:10px;"></div>' +
      '<canvas id="camCanvas" style="display:none;"></canvas>' +
    '</div>';
  _startCameraStream(container);
  document.getElementById('camCaptureBtn').onclick = function() {
    const video = document.getElementById('camViewfinder');
    const canvas = document.getElementById('camCanvas');
    const w = video.videoWidth || 480, h = video.videoHeight || 640;
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    if (_cameraFacing === 'user') {
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
    }
    ctx.drawImage(video, 0, 0, w, h);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    _capturedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
    stopCamera();
    const preview = document.getElementById('camPreview');
    preview.innerHTML =
      '<div style="margin-top:6px;">' +
        '<img src="' + _capturedDataUrl + '" class="photo-preview" style="max-height:200px;cursor:pointer;" onclick="showFullPhoto(-1,\'' + _capturedDataUrl.replace(/'/g, "\\'") + '\')">' +
        '<div style="display:flex;gap:10px;justify-content:center;margin-top:8px;">' +
          '<button class="card-action" id="camConfirmBtn">💕 ' + (isEn ? 'Confirm' : 'Confirmar') + '</button>' +
          '<button class="btn btn-ghost" id="camRetakeBtn">🔄 ' + (isEn ? 'Retake' : 'Repetir') + '</button>' +
        '</div>' +
      '</div>';
    document.getElementById('camViewfinder').style.display = 'none';
    document.getElementById('camCaptureBtn').style.display = 'none';
    document.getElementById('camCancelBtn').style.display = 'none';
    document.getElementById('camFlipBtn').style.display = 'none';
    document.getElementById('camConfirmBtn').onclick = function() {
      container.innerHTML = '';
      if (typeof onCapture === 'function') onCapture(_capturedDataUrl);
      _capturedDataUrl = null;
    };
    document.getElementById('camRetakeBtn').onclick = function() {
      openCamera(containerId, onCapture);
    };
  };
  document.getElementById('camCancelBtn').onclick = function() {
    stopCamera();
    container.innerHTML = '';
    _capturedDataUrl = null;
  };
}

async function loadPartnerChallengeList() {

    refresh.innerHTML = `<button class="btn btn-ghost" onclick="loadPartnerChallengeList()" style="font-size:0.72rem;">🔄 ${isEn ? 'Refresh' : 'Atualizar'}</button>`;
  } catch(e) {

  html += `<div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text-light);">${d.current_offset + 1} / ${d.max_offset + 1}</div>`;

    html += `<button class="card-action small" onclick="navigateQuote(${d.current_offset + 1})" style="padding:8px 16px;font-size:1.2rem;">›</button>`;
  } else {
    html += `<div style="width:44px;"></div>`;
  }

  const qText = isEn ? (q.quote_en || q.quote_pt || '') : (q.quote_pt || q.quote_en || '');

    html += `<div style="margin-top:12px;font-size:0.9rem;color:var(--text-light);font-style:italic;padding:14px;background:rgba(255,255,255,0.5);border-radius:var(--radius-sm);">"${esc(q.original)}"</div>`;

function formatAnswer(answer, opts) {
  if (answer === null || answer === undefined) return '?';
  const num = typeof answer === 'number' ? answer : (typeof answer === 'string' && /^\d+$/.test(answer) ? parseInt(answer, 10) : NaN);
  if (!isNaN(num) && opts && opts[num] !== undefined) return opts[num];
  return answer;
}

let quizState = { step: 'load', idx: 0, category: 'basic', answers: [] };
let quizGen = 0;

function loadQuiz() {
  const gen = ++quizGen;
  quizState = { step: 'load', idx: 0, category: 'basic', answers: [] };
  api('/api/couple/quiz', {
    headers: { 'X-Couple-Id': COUPLE_ID, 'X-User-Name': USER_NAME }
  }).then(d => {
    if (gen !== quizGen) return;
    const qs = QUIZ_QUESTIONS;
    const myAnswers = {};
    (d.answers || []).forEach(a => { myAnswers[a.question_idx] = a; });
    quizState.partnerName = d.partner_name || PARTNER_NAME;

    const basicQs = qs.filter(q => q.category === 'basic');
    const spicyQs = qs.filter(q => q.category === 'spicy');

    function firstUnanswered(arr, field) {
      for (let i = 0; i < arr.length; i++) {
        const idx = QUIZ_QUESTIONS.indexOf(arr[i]);
        const a = myAnswers[idx];
        if (!a || a[field] === null || a[field] === undefined) return i;
      }
      return -1;
    }

    // Resume self about self (basic)
    let idx = firstUnanswered(basicQs, 'my_self');
    if (idx >= 0) {
      quizState.step = 'self'; quizState.category = 'basic'; quizState.idx = idx;
      renderQuizSelf('basic'); return;
    }
    // Resume partner about partner (basic)
    idx = firstUnanswered(basicQs, 'my_partner');
    if (idx >= 0) {
      quizState.step = 'partner'; quizState.category = 'basic'; quizState.idx = idx;
      renderQuizPartner('basic'); return;
    }
    // Resume self about self (spicy)
    idx = firstUnanswered(spicyQs, 'my_self');
    if (idx >= 0) {
      quizState.step = 'self'; quizState.category = 'spicy'; quizState.idx = idx;
      renderQuizSelf('spicy'); return;
    }
    // Resume partner about partner (spicy)
    idx = firstUnanswered(spicyQs, 'my_partner');
    if (idx >= 0) {
      quizState.step = 'partner'; quizState.category = 'spicy'; quizState.idx = idx;
      renderQuizPartner('spicy'); return;
    }
    // All done
    quizState.step = 'results';
    renderQuizResults();
  }).catch(e => {
    const main = document.getElementById('mainContent');
    main.innerHTML = `<div class="empty-state">${esc(e.message)}</div>`;
  });
}

function renderQuizSelf(category) {
  const main = document.getElementById('mainContent');
  const isEn = getLang() === 'en';
  const qs = QUIZ_QUESTIONS.filter(q => q.category === category);
  if (quizState.idx >= qs.length) {
    // Move to partner phase
    quizState.idx = 0;
    quizState.step = 'partner';
    renderQuizPartner(category);
    return;
  }
  const q = qs[quizState.idx];
  const label = isEn ? `About me (${quizState.idx + 1}/${qs.length})` : `Sobre mim (${quizState.idx + 1}/${qs.length})`;
  const qText = isEn ? q.en : q.pt;
  const qOpts = isEn ? q.opts_en : q.opts_pt;
  const opts = qOpts.map((o, i) => `<button class="answer-option" onclick="answerSelf(${i}, '${category}')">${esc(o)}</button>`).join('');

  main.innerHTML = `<div class="section"><div class="section-title">❓ ${isEn ? 'Quiz' : 'Quiz'}${backLink()}</div>
    <div class="card" style="text-align:center;">
      <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--pink-dark);margin-bottom:10px;background:var(--cream);padding:8px 14px;border-radius:var(--radius-sm);">
        💡 ${isEn ? 'Answer honestly! Once you both answer, you\'ll see each other\'s responses.' : 'Responda com sinceridade! Depois que ambos responderem, vocês verão as respostas um do outro.'}
      </div>
      <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--text-light);margin-bottom:8px;">${label}</div>
      <div style="font-size:0.9rem;font-weight:700;margin-bottom:12px;line-height:1.5;">${qText.replace('minha','sua').replace('meu','seu').replace('my','your').replace('me','you')}</div>
      <div>${opts}</div>
      <div style="margin-top:14px;border-top:1px dashed rgba(0,0,0,0.08);padding-top:14px;">
        <button class="card-action small" onclick="this.style.display='none';document.getElementById('customSelfArea').style.display='block'">✏️ ${isEn ? 'Other...' : 'Outro...'}</button>
        <div id="customSelfArea" style="display:none;margin-top:8px;">
          <input type="text" id="customSelfInput" placeholder="${isEn ? 'Type your answer...' : 'Digite sua resposta...'}" style="width:100%;">
          <button class="card-action small" onclick="answerSelfCustom('${category}')" style="margin-top:8px;">💕 ${isEn ? 'Submit' : 'Enviar'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function answerSelfCustom(category) {
  const text = document.getElementById('customSelfInput').value.trim();
  if (!text) return;
  answerSelf(text, category);
}

function answerSelf(selected, category) {
  const isEn = getLang() === 'en';
  const qs = QUIZ_QUESTIONS.filter(q => q.category === category);
  const q = qs[quizState.idx];
  api('/api/couple/quiz/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: { couple_id: COUPLE_ID, author_id: USER_NAME, question_idx: QUIZ_QUESTIONS.indexOf(q), category, about_self: String(selected) }
  }).then(() => {
    showToast(isEn ? 'Saved! 💕' : 'Salvo! 💕');
    quizState.idx++;
    renderQuizSelf(category);
  }).catch(e => showToast(e.message, true));
}

function renderQuizPartner(category) {
  const main = document.getElementById('mainContent');
  const isEn = getLang() === 'en';
  const qs = QUIZ_QUESTIONS.filter(q => q.category === category);
  if (quizState.idx >= qs.length) {
    // Check spicy
    if (category === 'basic') {
      quizState.idx = 0;
      quizState.category = 'spicy';
      renderQuizSelf('spicy');
      return;
    }
    // Show results
    quizState.step = 'results';
    renderQuizResults();
    return;
  }
  const q = qs[quizState.idx];
  const partner = quizState.partnerName || PARTNER_NAME;
  const label = isEn ? `About ${partner} (${quizState.idx + 1}/${qs.length})` : `Sobre ${partner} (${quizState.idx + 1}/${qs.length})`;
  const qText = isEn ? q.en : q.pt;
  const qOpts = isEn ? q.opts_en : q.opts_pt;
  const replaced = isEn ? qText.replace('my', `${partner}'s`).replace(' me ', ' ' + partner + ' ') : qText.replace('minha', `da ${partner}`).replace('meu', `do ${partner}`).replace(' minha ', ' da ' + partner).replace(' meu ', ' do ' + partner);
  const opts = qOpts.map((o, i) => `<button class="answer-option" onclick="answerPartner(${i}, '${category}')">${esc(o)}</button>`).join('');

  main.innerHTML = `<div class="section"><div class="section-title">❓ ${isEn ? 'Quiz' : 'Quiz'}${backLink()}</div>
    <div class="card" style="text-align:center;">
      <div style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--pink-dark);margin-bottom:10px;background:var(--cream);padding:8px 14px;border-radius:var(--radius-sm);">
        💡 ${isEn ? 'Think about what you know about your partner... The results will appear when you both finish!' : 'Pense no que você conhece sobre seu parceiro... Os resultados aparecerão quando ambos terminarem!'}
      </div>
      <div style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--text-light);margin-bottom:8px;">${label}</div>
      <div style="font-size:0.9rem;font-weight:700;margin-bottom:12px;line-height:1.5;">${esc(replaced)}</div>
      <div>${opts}</div>
      <div style="margin-top:14px;border-top:1px dashed rgba(0,0,0,0.08);padding-top:14px;">
        <button class="card-action small" onclick="this.style.display='none';document.getElementById('customPartnerArea').style.display='block'">✏️ ${isEn ? 'Other...' : 'Outro...'}</button>
        <div id="customPartnerArea" style="display:none;margin-top:8px;">
          <input type="text" id="customPartnerInput" placeholder="${isEn ? 'Type your answer...' : 'Digite sua resposta...'}" style="width:100%;">
          <button class="card-action small" onclick="answerPartnerCustom('${category}')" style="margin-top:8px;">💕 ${isEn ? 'Submit' : 'Enviar'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function answerPartnerCustom(category) {
  const text = document.getElementById('customPartnerInput').value.trim();
  if (!text) return;
  answerPartner(text, category);
}

function answerPartner(selected, category) {
  const isEn = getLang() === 'en';
  const qs = QUIZ_QUESTIONS.filter(q => q.category === category);
  const q = qs[quizState.idx];
  api('/api/couple/quiz/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: { couple_id: COUPLE_ID, author_id: USER_NAME, question_idx: QUIZ_QUESTIONS.indexOf(q), category, about_partner: String(selected) }
  }).then(() => {
    showToast(isEn ? 'Saved! 💕' : 'Salvo! 💕');
    quizState.idx++;
    renderQuizPartner(category);
  }).catch(e => showToast(e.message, true));
}

function renderQuizResults() {
  const main = document.getElementById('mainContent');
  const isEn = getLang() === 'en';
  const partner = quizState.partnerName || PARTNER_NAME;

  api('/api/couple/quiz', {
    headers: { 'X-Couple-Id': COUPLE_ID, 'X-User-Name': USER_NAME }
  }).then(d => {
    const answerMap = {};
    (d.answers || []).forEach(a => { answerMap[a.question_idx] = a; });

    const mySelfAnswers = {};
    const myPartnerAnswers = {};
    const partnerSelfAnswers = {};
    const partnerPartnerAnswers = {};
    (d.answers || []).forEach(a => {
      if (a.my_self !== null && a.my_self !== undefined) mySelfAnswers[a.question_idx] = a.my_self;
      if (a.my_partner !== null && a.my_partner !== undefined) myPartnerAnswers[a.question_idx] = a.my_partner;
      if (a.partner_self !== null && a.partner_self !== undefined) partnerSelfAnswers[a.question_idx] = a.partner_self;
      if (a.partner_partner !== null && a.partner_partner !== undefined) partnerPartnerAnswers[a.question_idx] = a.partner_partner;
    });

    const totalBasic = QUIZ_QUESTIONS.filter(q => q.category === 'basic').length;
    const totalSpicy = QUIZ_QUESTIONS.filter(q => q.category === 'spicy').length;
    const partnerSelfCount = Object.keys(partnerSelfAnswers).length;
    const partnerPartnerCount = Object.keys(partnerPartnerAnswers).length;
    const mySelfCount = Object.keys(mySelfAnswers).length;
    const myPartnerCount = Object.keys(myPartnerAnswers).length;

    let html = `<div class="section"><div class="section-title">❓ ${isEn ? 'Quiz Results' : 'Resultados do Quiz'}${backLink()}</div>`;

    if (!d.partner_answered) {
      html += `<div class="card"><div class="empty-state">⏳ ${isEn ? `Waiting for ${partner} to answer...` : `Aguardando ${partner} responder...`}</div></div>`;
      html += `</div>`;
      main.innerHTML = html;
      return;
    }

    // Compare basic
    let matchCount = 0;
    let totalCompared = 0;
    html += `<div class="card"><div class="card-title">💕 ${isEn ? 'Basic Questions' : 'Perguntas Básicas'}</div>`;
    QUIZ_QUESTIONS.filter(q => q.category === 'basic').forEach((q, i) => {
      const idx = QUIZ_QUESTIONS.indexOf(q);
      const mySelf = mySelfAnswers[idx];
      const partnerAboutMe = partnerPartnerAnswers[idx]; // partner's guess about me
      const partnerSelf = partnerSelfAnswers[idx];
      const myAboutPartner = myPartnerAnswers[idx];

      if (mySelf !== undefined && partnerAboutMe !== undefined) {
        totalCompared++;
        const matchVal = String(mySelf) === String(partnerAboutMe);
        if (matchVal) matchCount++;
        const match = matchVal ? '✅' : '❌';
        html += `<div class="diary-entry"><div class="meta">${match} ${isEn ? q.en : q.pt}</div>
          <div class="content" style="font-size:0.82rem;">
            <div>${esc(USER_DISPLAY || USER_NAME)} ${isEn ? 'said about self' : 'disse sobre si'}: <strong>${esc(formatAnswer(mySelf, isEn ? q.opts_en : q.opts_pt))}</strong></div>
            <div>${esc(partner)} ${isEn ? 'thinks about you' : 'acha sobre você'}: <strong>${esc(formatAnswer(partnerAboutMe, isEn ? q.opts_en : q.opts_pt))}</strong></div>
          </div></div>`;
      } else if (mySelf !== undefined && partnerAboutMe === undefined) {
        html += `<div class="diary-entry"><div class="meta">⏳ ${isEn ? q.en : q.pt}</div>
          <div class="content" style="font-size:0.82rem;color:var(--text-light);">
            ${isEn ? `Waiting for ${partner} to answer about you...` : `Aguardando ${partner} responder sobre você...`}
          </div></div>`;
      }
    });
    html += `<div style="text-align:center;padding:8px;font-weight:700;">${isEn ? `Match: ${matchCount}/${totalCompared}` : `Acertos: ${matchCount}/${totalCompared}`}</div>`;
    html += `</div>`;

    // Compare spicy
    let spicyMatch = 0;
    let spicyTotal = 0;
    html += `<div class="card"><div class="card-title">🔥 ${isEn ? 'Spicy Questions' : 'Perguntas Apimentadas'}</div>`;
    QUIZ_QUESTIONS.filter(q => q.category === 'spicy').forEach((q, i) => {
      const idx = QUIZ_QUESTIONS.indexOf(q);
      const mySelf = mySelfAnswers[idx];
      const partnerAboutMe = partnerPartnerAnswers[idx];
      const partnerSelf = partnerSelfAnswers[idx];
      const myAboutPartner = myPartnerAnswers[idx];

      if (mySelf !== undefined && partnerAboutMe !== undefined) {
        spicyTotal++;
        const matchVal = String(mySelf) === String(partnerAboutMe);
        if (matchVal) spicyMatch++;
        const match = matchVal ? '✅' : '❌';
        html += `<div class="diary-entry"><div class="meta">${match} ${isEn ? q.en : q.pt}</div>
          <div class="content" style="font-size:0.82rem;">
            <div>${esc(USER_DISPLAY || USER_NAME)}: <strong>${esc(formatAnswer(mySelf, isEn ? q.opts_en : q.opts_pt))}</strong></div>
            <div>${esc(partner)} ${isEn ? 'thinks' : 'acha'}: <strong>${esc(formatAnswer(partnerAboutMe, isEn ? q.opts_en : q.opts_pt))}</strong></div>
          </div></div>`;
      } else if (mySelf !== undefined && partnerAboutMe === undefined) {
        html += `<div class="diary-entry"><div class="meta">⏳ ${isEn ? q.en : q.pt}</div>
          <div class="content" style="font-size:0.82rem;color:var(--text-light);">
            ${isEn ? `Waiting for ${partner}...` : `Aguardando ${partner}...`}
          </div></div>`;
      }
    });
    html += `<div style="text-align:center;padding:8px;font-weight:700;">${isEn ? `Match: ${spicyMatch}/${spicyTotal}` : `Acertos: ${spicyMatch}/${spicyTotal}`}</div>`;
    html += `</div>`;

    if (d.partner_answered && !d.my_answered) {
      html += `<div class="card"><div class="empty-state">💭 ${isEn ? 'Answer about yourself first!' : 'Responda sobre você primeiro!'}</div></div>`;
    }

    html += `<div class="card" style="text-align:center;">
      <button class="card-action" onclick="loadQuiz()">🔄 ${isEn ? 'Refresh' : 'Atualizar'}</button>
    </div>`;

    html += `</div>`;
    main.innerHTML = html;
  }).catch(e => {
    main.innerHTML = `<div class="empty-state">${esc(e.message)}</div>`;
  });
}

function showFullPhoto(idx, url) {
  const dataUrl = url || (idx >= 0 ? _photosData[idx] : null);
  if (!dataUrl) return;
  const modal = document.getElementById('settingsModal');
  modal.querySelector('.modal-box').innerHTML = `
    <div style="text-align:center;">
      <img src="${esc(dataUrl)}" style="max-width:100%;max-height:70vh;border-radius:var(--radius-sm);filter:sepia(0.3) contrast(0.9);box-shadow:var(--shadow);">
      <br><br>
      <button class="btn btn-outline" onclick="closeSettings()">${getLang() === 'en' ? 'Close' : 'Fechar'}</button>
    </div>`;
  modal.classList.add('show');
}

let toastTimer;
function showToast(msg, isError = false) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.id = 'toast';
  el.style.cssText =
    `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);` +
    `background:${isError ? 'linear-gradient(135deg,var(--pink-dark),#e86070)' : 'linear-gradient(135deg,var(--correct),#5cc888)'};` +
    `color:white;padding:14px 28px;border-radius:var(--radius-cloud);font-weight:800;font-size:0.85rem;` +
    `z-index:300;box-shadow:0 6px 30px rgba(0,0,0,0.15);` +
    `font-family:'Nunito',sans-serif;` +
    `animation:toastIn 0.35s var(--ease-bounce);` +
    `text-align:center;max-width:90%;`;
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(30px)';
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 2800);
}

function init() {
  initDecorations();
  if (!COUPLE_ID || !USER_NAME) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state" style="padding:60px 20px;">${getLang() === 'en' ? 'Please log in first' : 'Faça login primeiro'}<br><br><button class="btn btn-primary" onclick="window.location.href='/'">${getLang() === 'en' ? 'Go to Login' : 'Ir para Login'}</button></div>`;
    return;
  }
  const display = USER_DISPLAY || USER_NAME;
  document.getElementById('userGreeting').innerHTML = `✦ ${display} ✦`;
  updateNavLang();
  const savedSection = sessionStorage.getItem('lang_section');
  if (savedSection) {
    sessionStorage.removeItem('lang_section');
    showSection(savedSection);
  } else {
    showSection('today');
  }
}

setTimeout(init, 100);
