<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Still Learning 💕</title>
<link rel="stylesheet" href="/static/style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --rose: #ff7d8a;
  --rose-light: #ffb5c2;
  --rose-dark: #e86070;
  --lavender: #c4a4dc;
  --lavender-light: #e0c8f0;
  --cream: #fff8f5;
  --bg: #fef6f3;
  --text: #4a3a4a;
  --text-muted: #b0a0b0;
  --text-light: #8a7a8a;
  --card-bg: #ffffff;
  --radius: 28px;
  --radius-md: 18px;
  --radius-sm: 14px;
  --shadow-sm: 0 2px 8px rgba(180,120,160,0.06);
  --shadow-md: 0 4px 20px rgba(180,120,160,0.1);
  --shadow-lg: 0 8px 40px rgba(180,120,160,0.14);
  --transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
body { font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 90px; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(255,181,194,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }
#app { position: relative; z-index: 1; }

.app-header {
  background: linear-gradient(135deg, #ff9aa8 0%, #c4a4dc 50%, #a8c8e8 100%);
  padding: 50px 24px 36px;
  text-align: center;
  position: relative;
  border-radius: 0 0 var(--radius) var(--radius);
  box-shadow: 0 6px 30px rgba(180,120,160,0.15);
  overflow: hidden;
}
.app-header::before { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 30px; background: var(--bg); border-radius: var(--radius) var(--radius) 0 0; }
.app-header::after { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1.5' fill='rgba(255,255,255,0.15)'/%3E%3Ccircle cx='80' cy='30' r='1' fill='rgba(255,255,255,0.1)'/%3E%3Ccircle cx='50' cy='70' r='1.2' fill='rgba(255,255,255,0.12)'/%3E%3C/svg%3E"); pointer-events: none; }
.app-header h1 { font-family: 'Georgia', serif; font-size: 20px; color: white; text-shadow: 0 2px 12px rgba(0,0,0,0.08); letter-spacing: -0.5px; position: relative; z-index: 1; }
.app-header .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.85); margin-top: 6px; font-weight: 500; position: relative; z-index: 1; }
.lang-toggle { position: absolute; top: 14px; right: 16px; background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 6px 16px; font-size: 11px; font-weight: 700; cursor: pointer; color: white; font-family: 'Nunito', sans-serif; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); letter-spacing: 0.5px; transition: var(--transition); z-index: 2; }
.lang-toggle:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }

.user-greeting { padding: 20px 24px 4px; font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.user-greeting small { font-weight: 400; font-size: 0.85rem; color: var(--text-light); display: block; margin-top: 2px; }

.section { padding: 16px 20px; animation: sectionIn 0.3s ease; }
@keyframes sectionIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.section-title { font-size: 0.8rem; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title a { margin-left: auto; font-size: 0.75rem; text-decoration: none; color: var(--rose); font-weight: 600; text-transform: none; letter-spacing: 0; transition: var(--transition); }
.section-title a:hover { color: var(--rose-dark); }

.card {
  background: var(--card-bg);
  border-radius: var(--radius-md);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(255,181,194,0.1);
  transition: var(--transition);
  animation: cardIn 0.35s ease both;
}
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }
.card:nth-child(5) { animation-delay: 0.2s; }
@keyframes cardIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.card:hover { box-shadow: var(--shadow-md); border-color: rgba(255,181,194,0.2); }
.card-title { font-weight: 700; font-size: 1rem; margin-bottom: 8px; color: var(--text); }
.card-text { font-size: 0.88rem; color: var(--text-light); line-height: 1.7; }
.card-action {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; padding: 10px 22px;
  background: linear-gradient(135deg, var(--rose-light), var(--lavender));
  color: white; border: none; border-radius: var(--radius-sm); font-weight: 700;
  font-size: 0.85rem; cursor: pointer; text-decoration: none; transition: var(--transition);
  box-shadow: 0 2px 10px rgba(255,125,138,0.2);
}
.card-action:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 4px 16px rgba(255,125,138,0.3); }
.card-action:active { transform: scale(0.97); }
.card-action.small { padding: 8px 16px; font-size: 0.78rem; }

.card-icon { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-bottom: 10px; }
.card-icon.pink { background: linear-gradient(135deg, #ffe0e6, #ffb5c2); }
.card-icon.purple { background: linear-gradient(135deg, #e8d4f0, #d4b8e8); }
.card-icon.blue { background: linear-gradient(135deg, #d0e8f8, #a8d0f0); }
.card-icon.green { background: linear-gradient(135deg, #d0f0d8, #a8e0b8); }
.card-icon.orange { background: linear-gradient(135deg, #ffe0c0, #ffc8a0); }
.card-row { display: flex; align-items: center; gap: 14px; }
.card-row .card-text { flex: 1; }

.stat-row { display: flex; gap: 10px; margin: 4px 0; }
.stat-pill { flex: 1; background: var(--bg); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
.stat-pill .num { font-size: 1.5rem; font-weight: 800; color: var(--rose); }
.stat-pill .label { font-size: 0.7rem; color: var(--text-light); margin-top: 2px; font-weight: 600; }

.empty-state { text-align: center; padding: 28px 0; color: var(--text-muted); font-size: 0.88rem; line-height: 1.8; }
.mood-selector { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
.mood-btn { font-size: 1.6rem; padding: 8px 12px; border: 2px solid transparent; border-radius: 14px; cursor: pointer; background: var(--bg); transition: var(--transition); }
.mood-btn:hover { transform: scale(1.12); background: white; }
.mood-btn.selected { border-color: var(--rose); background: white; transform: scale(1.15); box-shadow: 0 2px 12px rgba(255,125,138,0.15); }
textarea, input[type="text"], input[type="datetime-local"] { width: 100%; padding: 14px 16px; border: 2px solid rgba(255,181,194,0.15); border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 16px; resize: vertical; min-height: 80px; outline: none; transition: var(--transition); background: var(--bg); }
textarea:focus, input:focus { border-color: var(--rose); background: white; box-shadow: 0 0 0 4px rgba(255,125,138,0.08); }
input[type="text"] { min-height: auto; }

.nav-bar {
  position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  display: flex; border-top: 1px solid rgba(255,181,194,0.1);
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 0px)) 0;
  z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
}
.nav-item { flex: 1; text-align: center; padding: 4px 2px; cursor: pointer; color: var(--text-muted); font-size: 9px; font-weight: 700; transition: var(--transition); position: relative; letter-spacing: 0.3px; }
.nav-item .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 2px; transition: var(--transition); }
.nav-item.active { color: var(--rose); }
.nav-item.active .nav-icon { transform: scale(1.1); }
.nav-item.active::after { content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: var(--rose); border-radius: 0 0 4px 4px; }
.nav-item:hover { color: var(--rose); }

.diary-entry { border-left: 3px solid var(--rose); padding: 14px 16px; margin-bottom: 10px; background: var(--bg); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; transition: var(--transition); }
.diary-entry:hover { background: white; }
.diary-entry .meta { font-size: 0.75rem; color: var(--text-light); margin-bottom: 6px; display: flex; gap: 8px; align-items: center; }
.diary-entry .content { font-size: 0.9rem; line-height: 1.7; white-space: pre-line; }

.challenge-box { text-align: center; padding: 24px 16px; }
.challenge-box .challenge-word { font-family: 'Courier New', monospace; font-size: 1.8rem; letter-spacing: 10px; padding: 20px; background: var(--bg); border-radius: var(--radius-md); display: inline-block; margin: 16px 0; font-weight: 800; color: var(--text); }
.challenge-box .challenge-riddle { font-size: 1.05rem; font-style: italic; padding: 20px 16px; line-height: 1.7; color: var(--text); }
.challenge-type-badge { display: inline-block; padding: 4px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; background: var(--bg); color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

.agenda-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid rgba(255,181,194,0.08); transition: var(--transition); }
.agenda-item:last-child { border: none; }
.agenda-item:hover { padding-left: 6px; }
.agenda-date { min-width: 52px; text-align: center; }
.agenda-date .day { font-size: 1.5rem; font-weight: 800; line-height: 1; color: var(--text); }
.agenda-date .mon { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.agenda-info { flex: 1; }
.agenda-info .title { font-weight: 700; font-size: 0.9rem; }
.agenda-info .desc { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; line-height: 1.5; }

.todo-item { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,181,194,0.06); transition: var(--transition); }
.todo-item:last-child { border: none; }
.todo-item:hover { padding-left: 4px; }
.todo-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--rose-light); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 0.7rem; transition: var(--transition); background: var(--bg); }
.todo-check.done { background: linear-gradient(135deg, var(--rose-light), var(--lavender)); color: white; border-color: transparent; }
.todo-check:hover { border-color: var(--rose); transform: scale(1.1); }
.todo-content { flex: 1; }
.todo-content .title { font-weight: 600; font-size: 0.9rem; }
.todo-content .title.done-text { text-decoration: line-through; color: var(--text-muted); }
.todo-content .meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.add-form { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }

.review-box { background: var(--bg); border-radius: var(--radius-sm); padding: 18px; margin-bottom: 14px; border: 1px solid rgba(255,181,194,0.08); }
.review-box .review-header { font-weight: 700; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-light); }
.review-box .review-text { font-size: 0.9rem; line-height: 1.7; color: var(--text); white-space: pre-line; padding: 12px 16px; background: white; border-radius: var(--radius-sm); }
.review-box .review-empty { color: var(--text-light); font-style: italic; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; display: none; align-items: flex-end; justify-content: center; padding: 0; animation: modalOverlay 0.2s ease; }
@keyframes modalOverlay { from { opacity: 0; } to { opacity: 1; } }
.modal-overlay.show { display: flex; }
.modal-box {
  background: white; border-radius: var(--radius) var(--radius) 0 0; padding: 28px 24px calc(24px + env(safe-area-inset-bottom, 12px));
  width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto;
  animation: modalUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 -8px 40px rgba(0,0,0,0.1);
}
@keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.hidden { display: none !important; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 14px 28px; background: linear-gradient(135deg, var(--rose-light), var(--lavender));
  color: white; border: none; border-radius: var(--radius-sm); font-weight: 700;
  font-size: 0.9rem; cursor: pointer; transition: var(--transition);
  box-shadow: 0 2px 10px rgba(255,125,138,0.2); font-family: 'Nunito', sans-serif;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,125,138,0.3); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; border: 2px solid var(--rose-light); color: var(--rose); box-shadow: none; }
.btn-outline:hover { background: rgba(255,181,194,0.08); box-shadow: none; }
.btn-ghost { background: transparent; color: var(--text-light); box-shadow: none; padding: 10px 16px; }
.btn-ghost:hover { background: var(--bg); box-shadow: none; transform: none; }

.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.loading { text-align: center; padding: 60px 20px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 12px; }
.loading .spinner { width: 32px; height: 32px; border-width: 3px; border-color: rgba(255,181,194,0.2); border-top-color: var(--rose); }

@media (max-width: 600px) {
  .app-header { padding: 44px 20px 30px; border-radius: 0 0 24px 24px; }
  .app-header h1 { font-size: 17px; }
  .section { padding: 12px 14px; }
  .card { padding: 16px; }
  .nav-item { font-size: 8px; }
  .nav-item .nav-icon { font-size: 1.3rem; }
  .user-greeting { padding: 16px 18px 4px; font-size: 1.2rem; }
  .stat-pill { padding: 10px 8px; }
  .stat-pill .num { font-size: 1.2rem; }
}
@media (max-width: 400px) {
  .app-header { padding: 38px 14px 24px; }
  .app-header h1 { font-size: 15px; }
  .app-header .subtitle { font-size: 0.75rem; }
  .section { padding: 8px 10px; }
  .card { padding: 14px; margin-bottom: 10px; border-radius: var(--radius-sm); }
  .nav-item { font-size: 7px; }
  .nav-item .nav-icon { font-size: 1.1rem; }
}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
    <h1>Still Learning 💕</h1>
    <div class="subtitle" id="headerSub">Aprendendo um ao outro, um dia de cada vez</div>
  </div>
  <div id="userGreeting" class="user-greeting"></div>
  <div id="mainContent"></div>
</div>

<div class="nav-bar" id="navBar">
  <div class="nav-item active" data-nav="dashboard" onclick="showSection('dashboard')"><span class="nav-icon">🏠</span>Início</div>
  <div class="nav-item" data-nav="question" onclick="showSection('question')"><span class="nav-icon">💭</span>Pergunta</div>
  <div class="nav-item" data-nav="diary" onclick="showSection('diary')"><span class="nav-icon">📖</span>Diário</div>
  <div class="nav-item" data-nav="challenge" onclick="showSection('challenge')"><span class="nav-icon">🎯</span>Desafio</div>
  <div class="nav-item" data-nav="more" onclick="toggleMoreMenu()"><span class="nav-icon">📋</span>Mais</div>
</div>

<div class="modal-overlay" id="moreModal" onclick="if(event.target===this)closeMoreMenu()">
  <div class="modal-box" style="text-align:center;">
    <div style="font-weight:700;margin-bottom:16px;font-size:1rem;">Still Learning 💕</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-outline" onclick="showSection('agenda');closeMoreMenu()">📅 Agenda</button>
      <button class="btn btn-outline" onclick="showSection('todos');closeMoreMenu()">📋 Listas</button>
      <button class="btn btn-outline" onclick="showSection('review');closeMoreMenu()">📖 Revisão Semanal</button>
      <button class="btn-ghost btn" style="margin-top:12px;color:var(--text-muted);" onclick="logout()">🚪 Sair</button>
    </div>
  </div>
</div>

<script>
const _t = {};
const _lang = '{{ lang }}' || 'pt';
const COUPLE_ID = localStorage.getItem('couple_id') || '';
const USER_NAME = localStorage.getItem('user_name') || '';
const USER_DISPLAY = localStorage.getItem('user_display') || '';
const PARTNER_NAME = localStorage.getItem('partner_name') || '';

let state = { section: 'dashboard', data: {} };

async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  if (COUPLE_ID) opts.headers['X-Couple-Id'] = COUPLE_ID;
  if (USER_NAME) opts.headers['X-User-Name'] = USER_NAME;
  if (PARTNER_NAME) opts.headers['X-Partner-Name'] = PARTNER_NAME;
  if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
  opts.headers['Content-Type'] = 'application/json';
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Request failed'); }
  return r.json();
}

function toggleLang() {
  document.cookie = 'lang=' + (getLang() === 'pt' ? 'en' : 'pt') + ';path=/;max-age=31536000';
  location.reload();
}
function getLang() { const m = document.cookie.match(/lang=([^;]+)/); return m ? m[1] : 'pt'; }
function t(key) { return _t[key] || (typeof LANG_DATA !== 'undefined' && LANG_DATA[key]) || key; }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function logout() { localStorage.clear(); window.location.href = '/'; }

function updateNavLang() {
  const isEn = getLang() === 'en';
  document.getElementById('langBtn').textContent = isEn ? 'PT' : 'EN';
  document.getElementById('headerSub').textContent = isEn ? 'Learning each other, one day at a time' : 'Aprendendo um ao outro, um dia de cada vez';
  document.querySelectorAll('[data-nav]').forEach(el => {
    const nav = el.dataset.nav;
    const labels = { dashboard: isEn ? 'Home' : 'Início', question: isEn ? 'Question' : 'Pergunta', diary: isEn ? 'Diary' : 'Diário', challenge: isEn ? 'Challenge' : 'Desafio', more: isEn ? 'More' : 'Mais' };
    el.childNodes[el.childNodes.length - 1].textContent = labels[nav] || nav;
  });
}
function toggleMoreMenu() { document.getElementById('moreModal').classList.toggle('show'); }
function closeMoreMenu() { document.getElementById('moreModal').classList.remove('show'); }

function showSection(name) {
  state.section = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.nav === name));
  closeMoreMenu();
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="loading"><div class="spinner"></div><span>${getLang() === 'en' ? 'Loading...' : 'Carregando...'}</span></div>`;
  if (name === 'dashboard') loadDashboard();
  else if (name === 'question') loadQuestion();
  else if (name === 'diary') loadDiary();
  else if (name === 'challenge') loadChallenge();
  else if (name === 'agenda') loadAgenda();
  else if (name === 'todos') loadTodos();
  else if (name === 'review') loadReview();
}

function monthsPt(m) { return ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][m]; }
function monthsEn(m) { return ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]; }

function loadDashboard() {
  const main = document.getElementById('mainContent');
  const u = USER_DISPLAY || USER_NAME;
  const isEn = getLang() === 'en';
  api('/api/couple/dashboard').then(d => {
    let html = `<div class="section">`;
    // Greeting
    html += `<div class="card" style="background:linear-gradient(135deg,#fff8f5,#f0e8ff);border-color:rgba(196,164,220,0.15);">
      <div style="font-size:1.3rem;font-weight:700;">${isEn ? 'Hello' : 'Olá'}, ${esc(u)} 💕</div>
      <div class="card-text" style="margin-top:4px;">${isEn ? 'What shall we do today?' : 'O que vamos fazer hoje?'}</div>
    </div>`;

    // Stats row
    html += `<div class="stat-row">
      <div class="stat-pill"><div class="num">${d.diary_count || 0}</div><div class="label">${isEn ? 'Diary' : 'Diário'}</div></div>
      <div class="stat-pill"><div class="num">${d.challenge?.exists ? (d.challenge.done ? '✅' : '🎯') : '—'}</div><div class="label">${isEn ? 'Challenge' : 'Desafio'}</div></div>
      <div class="stat-pill"><div class="num">${(d.todos||[]).filter(t=>!t.done).length}</div><div class="label">${isEn ? 'To-Dos' : 'Tarefas'}</div></div>
    </div>`;

    // Daily Question card
    html += `<div class="card"><div class="card-row">
      <div class="card-icon pink">💭</div>
      <div class="card-text">
        <strong>${isEn ? 'Daily Question' : 'Pergunta do Dia'}</strong><br>
        ${d.question && d.question.exists

let toastTimer;
function showToast(msg, isError = false) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.id = 'toast';
  el.style.cssText =
    `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);` +
    `background:${isError ? 'linear-gradient(135deg,#ff8fa0,#e86070)' : 'linear-gradient(135deg,#6bcc8a,#4ab06a)'};` +
    `color:white;padding:14px 28px;border-radius:var(--radius-sm);font-weight:600;font-size:0.9rem;` +
    `z-index:300;box-shadow:0 6px 30px rgba(0,0,0,0.15);` +
    `animation:toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);` +
    `text-align:center;max-width:90%;backdrop-filter:blur(8px);`;
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(20px)';
    setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
  }, 2800);
}

function init() {
  if (!COUPLE_ID || !USER_NAME) {
    document.getElementById('mainContent').innerHTML = `<div class="empty-state" style="padding:60px 20px;">${getLang() === 'en' ? 'Please log in first' : 'Faça login primeiro'}<br><br><button class="btn" onclick="window.location.href='/'">${getLang() === 'en' ? 'Go to Login' : 'Ir para Login'}</button></div>`;
    return;
  }
  const display = USER_DISPLAY || USER_NAME;
  document.getElementById('userGreeting').innerHTML = `${display} 💕`;
  updateNavLang();
  loadDashboard();
}

// Add toast animation keyframes
const styleSheet = document.createElement('style');
styleSheet.textContent = `@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(30px) scale(0.9); } to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); } }`;
document.head.appendChild(styleSheet);

setTimeout(init, 100);
</script>
</body>
</html>
