<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffb5c2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <title>Quiz {{ emoji }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="floating-bg"></div>
  <div class="floating-items" id="floatingItems"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-spinner">✨</div>
      <div class="loading-text" id="loadingText">preparando...</div>
    </div>
  </div>

  <div class="pista-overlay" id="pistaOverlay">
    <div class="pista-box">
      <div class="pista-emoji">🔓</div>
      <div class="pista-title">pista desbloqueada!</div>
      <div class="pista-poem" id="pistaPoem"></div>
      <button class="btn btn-primary pista-btn" onclick="closePista()">continuar 💕</button>
    </div>
  </div>

  <div class="welcome-overlay" id="welcomeOverlay">
    <div class="welcome-box">
      <div class="welcome-character" id="welcomeCharacter">
        <svg viewBox="0 0 120 130" width="100" height="110" id="welcomeHorseSvg" class="welcome-horse-svg">
          <defs>
            <linearGradient id="horseBody" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffdec2" />
              <stop offset="100%" stop-color="#f5c6a0" />
            </linearGradient>
            <linearGradient id="earInner" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb5c2" />
              <stop offset="100%" stop-color="#ff8fa0" />
            </linearGradient>
            <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
              <stop offset="0%" stop-color="#ff4500" />
              <stop offset="40%" stop-color="#ff6b00" />
              <stop offset="70%" stop-color="#ffa500" />
              <stop offset="100%" stop-color="#ffd700" />
            </linearGradient>
            <linearGradient id="flameGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
              <stop offset="0%" stop-color="#ff6347" />
              <stop offset="50%" stop-color="#ff8c00" />
              <stop offset="100%" stop-color="#ffe44d" />
            </linearGradient>
            <filter id="horseShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f5c6a0" flood-opacity="0.4" />
            </filter>
            <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>
          </defs>
          <ellipse cx="60" cy="65" rx="50" ry="50" fill="rgba(255,165,0,0.08)" />
          <g filter="url(#flameGlow)">
            <path d="M60 5 Q50 15 48 25 Q46 35 52 30 Q50 40 55 45 Q58 48 60 50 Q62 48 65 45 Q70 40 68 30 Q74 35 72 25 Q70 15 60 5Z" fill="url(#flameGrad)" class="flame" />
            <path d="M35 15 Q25 22 22 30 Q20 38 28 35 Q25 42 30 48 Q33 50 35 50 Q37 50 40 48 Q45 42 42 35 Q50 38 48 30 Q45 22 35 15Z" fill="url(#flameGrad2)" class="flame" style="animation-delay:0.2s" />
            <path d="M85 15 Q95 22 98 30 Q100 38 92 35 Q95 42 90 48 Q87 50 85 50 Q83 50 80 48 Q75 42 78 35 Q70 38 72 30 Q75 22 85 15Z" fill="url(#flameGrad2)" class="flame" style="animation-delay:0.4s" />
            <path d="M10 55 Q5 65 8 75 Q10 82 15 78 Q12 85 18 90 Q22 92 25 88 Q22 82 25 78 Q28 82 28 75 Q25 65 10 55Z" fill="url(#flameGrad)" class="flame" style="animation-delay:0.3s" />
            <path d="M110 55 Q115 65 112 75 Q110 82 105 78 Q108 85 102 90 Q98 92 95 88 Q98 82 95 78 Q92 82 92 75 Q95 65 110 55Z" fill="url(#flameGrad)" class="flame" style="animation-delay:0.5s" />
            <path d="M18 95 Q12 100 14 108 Q16 112 20 110 Q18 115 24 118 Q27 115 26 110 Q28 112 30 108 Q28 100 18 95Z" fill="url(#flameGrad2)" class="flame" style="animation-delay:0.1s" />
            <path d="M102 95 Q108 100 106 108 Q104 112 100 110 Q102 115 96 118 Q93 115 94 110 Q92 112 90 108 Q92 100 102 95Z" fill="url(#flameGrad2)" class="flame" style="animation-delay:0.6s" />
          </g>
          <path d="M38 30 Q30 15 40 10 Q45 5 50 15 Q48 8 55 5 Q58 3 60 3 Q62 3 65 5 Q72 8 70 15 Q75 5 80 10 Q90 15 82 30 Z" fill="url(#flameGrad)" class="flame" style="animation-delay:0.15s" />
          <path d="M28 45 Q18 35 22 28 Q26 22 32 30 Q28 25 34 22 Q38 20 40 25 Q38 30 35 35 Q38 40 28 45Z" fill="url(#flameGrad2)" class="flame" style="animation-delay:0.35s" />
          <path d="M92 45 Q102 35 98 28 Q94 22 88 30 Q92 25 86 22 Q82 20 80 25 Q82 30 85 35 Q82 40 92 45Z" fill="url(#flameGrad2)" class="flame" style="animation-delay:0.25s" />
          <path d="M32 38 Q22 10 40 22 Q42 25 44 32 Z" fill="url(#horseBody)" />
          <path d="M34 36 Q28 18 39 24 Q40 26 41 30 Z" fill="url(#earInner)" />
          <path d="M88 38 Q98 10 80 22 Q78 25 76 32 Z" fill="url(#horseBody)" />
          <path d="M86 36 Q92 18 81 24 Q80 26 79 30 Z" fill="url(#earInner)" />
          <path d="M60 25 C78 25 95 38 95 58 C95 78 82 95 60 100 C38 95 25 78 25 58 C25 38 42 25 60 25Z" fill="url(#horseBody)" filter="url(#horseShadow)" />
          <ellipse cx="60" cy="86" rx="24" ry="16" fill="#ffd4c4" />
          <circle cx="50" cy="88" r="3" fill="#e8a0a8" />
          <circle cx="70" cy="88" r="3" fill="#e8a0a8" />
          <circle cx="40" cy="52" r="9" fill="white" />
          <g class="eye-group" data-origin-x="44" data-origin-y="53">
            <circle class="pupil" cx="44" cy="53" r="5" fill="#4a3a5a" />
            <circle cx="45.5" cy="51" r="2" fill="white" />
          </g>
          <circle cx="80" cy="52" r="9" fill="white" />
          <g class="eye-group" data-origin-x="76" data-origin-y="53">
            <circle class="pupil" cx="76" cy="53" r="5" fill="#4a3a5a" />
            <circle cx="74.5" cy="51" r="2" fill="white" />
          </g>
          <path d="M33 47 Q36 44 39 46" stroke="#4a3a5a" stroke-width="1.5" fill="none" stroke-linecap="round" />
          <path d="M31 51 Q34 48 37 49" stroke="#4a3a5a" stroke-width="1.5" fill="none" stroke-linecap="round" />
          <path d="M87 47 Q84 44 81 46" stroke="#4a3a5a" stroke-width="1.5" fill="none" stroke-linecap="round" />
          <path d="M89 51 Q86 48 83 49" stroke="#4a3a5a" stroke-width="1.5" fill="none" stroke-linecap="round" />
          <ellipse cx="28" cy="68" rx="8" ry="4" fill="rgba(255,92,112,0.2)" />
          <ellipse cx="92" cy="68" rx="8" ry="4" fill="rgba(255,92,112,0.2)" />
          <path d="M50 94 Q60 102 70 94" stroke="#4a3a5a" stroke-width="2.5" fill="none" stroke-linecap="round" />
        </svg>
        <svg viewBox="-15 -15 150 150" width="100" height="100" id="welcomeHeartSvg" class="welcome-heart-svg" style="display:none">
          <defs>
            <linearGradient id="welcomeHeartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb5c2" />
              <stop offset="100%" stop-color="#ff8fa0" />
            </linearGradient>
            <filter id="welcomeHeartShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#ff8fa0" flood-opacity="0.35" />
            </filter>
          </defs>
          <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#welcomeHeartGrad)" filter="url(#welcomeHeartShadow)" />
          <ellipse cx="80" cy="25" rx="18" ry="10" fill="rgba(255,255,255,0.4)" transform="rotate(-20 80 25)" />
          <circle cx="42" cy="42" r="8" fill="white" />
          <g class="eye-group" data-origin-x="45" data-origin-y="44">
            <circle class="pupil" cx="45" cy="44" r="4.5" fill="#4a3a5a" />
            <circle cx="46.5" cy="42" r="1.8" fill="white" />
          </g>
          <circle cx="78" cy="42" r="8" fill="white" />
          <g class="eye-group" data-origin-x="81" data-origin-y="44">
            <circle class="pupil" cx="81" cy="44" r="4.5" fill="#4a3a5a" />
            <circle cx="82.5" cy="42" r="1.8" fill="white" />
          </g>
          <ellipse cx="30" cy="56" rx="8" ry="4" fill="rgba(255,92,112,0.2)" />
          <ellipse cx="90" cy="56" rx="8" ry="4" fill="rgba(255,92,112,0.2)" />
          <path d="M48 58 Q60 68 72 58" stroke="#4a3a5a" stroke-width="2.5" fill="none" stroke-linecap="round" />
        </svg>
      </div>
      <div class="welcome-text" id="welcomeText"></div>
      <button class="btn btn-primary" onclick="closeWelcome()">Começar</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="card-heart" id="cardHeart">
        <svg viewBox="-10 -10 140 130" width="28" height="28" id="miniHeartSvg">
          <defs>
            <linearGradient id="miniGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb5c2" />
              <stop offset="100%" stop-color="#ff8fa0" />
            </linearGradient>
            <filter id="miniShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff8fa0" flood-opacity="0.3" />
            </filter>
          </defs>
          <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#miniGrad)" filter="url(#miniShadow)" />
        </svg>
      </div>

      <div class="score-badge" id="scoreBadge"><span>❤️</span> 0</div>

      <div class="progress-section">
        <div class="progress-label">caminho para desbloquear mais pistas</div>
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" id="progressFill" style="width: 0%"></div>
          <div class="progress-text" id="progressText">0 / 10</div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-text" id="questionText"></div>
      </div>

      <div class="question-counter">
        <span id="questionCounter">pergunta 1 / 10</span>
      </div>

      <div class="options" id="optionsContainer"></div>

      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="feedbackIcon">🎉</span>
        <div class="feedback-text" id="feedbackText"></div>
      </div>

      <div class="next-btn-wrap" id="nextBtnWrap">
        <button class="btn btn-next" id="nextBtn" onclick="goNext()">
          próxima ➜
        </button>
      </div>
    </div>
  </div>

  <script>
    // floating icons bg
    const flowIcons = ['💕','❤️','💗','💖','✨'];
    const fi = document.getElementById('floatingItems');
    for (let i = 0; i < 5; i++) {
      const s = document.createElement('span');
      s.textContent = flowIcons[i % flowIcons.length];
      s.style.left = (10 + Math.random() * 80) + '%';
      s.style.top = (10 + Math.random() * 80) + '%';
      s.style.animationDelay = (Math.random() * 4) + 's';
      s.style.animationDuration = (8 + Math.random() * 4) + 's';
      s.style.fontSize = (16 + Math.random() * 14) + 'px';
      fi.appendChild(s);
    }

    const LETTERS = ['A', 'B', 'C', 'D'];
    const sessionId = window.location.pathname.split('/').pop();
    let answered = false;
    let correctCount = 0;
    let pistaIndex = 0;

    const pistas = {{ pistas_json|safe }};
    const carinhoMessages = {{ carinho_json|safe }};
    const welcomeMessage = {{ welcome_message|safe }};
    const profileId = '{{ profile_id }}';

    // ---- WELCOME OVERLAY ----
    function showWelcome() {
      if (!welcomeMessage) return;
      document.getElementById('welcomeText').textContent = welcomeMessage;
      document.getElementById('welcomeOverlay').classList.add('show');

      document.getElementById('welcomeHorseSvg').style.display = 'none';
      document.getElementById('welcomeHeartSvg').style.display = 'block';

      // character eye tracking (throttled)
      const charEl = document.getElementById('welcomeCharacter');
      const eyes = charEl.querySelectorAll('.eye-group');
      let eyeTick = false;
      const trackChar = (e) => {
        if (!document.getElementById('welcomeOverlay').classList.contains('show')) {
          document.removeEventListener('mousemove', trackChar);
          return;
        }
        if (eyeTick) return; eyeTick = true;
        requestAnimationFrame(() => {
          const rect = charEl.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = (e.clientX - cx) / Math.max(rect.width, 1);
          const dy = (e.clientY - cy) / Math.max(rect.height, 1);
          const maxMove = 3;
          eyes.forEach(g => {
            g.setAttribute('transform', `translate(${Math.max(-maxMove,Math.min(maxMove,dx*maxMove))}, ${Math.max(-maxMove,Math.min(maxMove,dy*maxMove))})`);
          });
          eyeTick = false;
        });
      };
      document.addEventListener('mousemove', trackChar);
    }

    function closeWelcome() {
      document.getElementById('welcomeOverlay').classList.remove('show');
      loadQuestion();
    }

    // ---- TYPEWRITER ----
    function typeWriter(el, text, callback) {
      el.textContent = '';
      let i = 0;

      function tick() {
        if (i < text.length) {
          el.textContent += text.charAt(i);
          i++;
          setTimeout(tick, 20 + Math.random() * 30);
        } else if (callback) {
          callback();
        }
      }
      tick();
    }

    // ---- LOADING (mais rápido) ----
    function showLoading(msg, callback) {
      const overlay = document.getElementById('loadingOverlay');
      document.getElementById('loadingText').textContent = msg || 'preparando...';
      overlay.classList.add('show');
      setTimeout(() => {
        overlay.classList.remove('show');
        if (callback) setTimeout(callback, 100);
      }, 400);
    }

    // ---- PISTA ----
    function showPista() {
      if (pistaIndex >= pistas.length) return;
      const pista = pistas[pistaIndex];
      pistaIndex++;
      document.getElementById('pistaPoem').innerHTML =
        pista.map(line => `<div class="poem-line">${line}</div>`).join('');
      document.getElementById('pistaOverlay').classList.add('show');
    }

    function closePista() {
      document.getElementById('pistaOverlay').classList.remove('show');
    }

    // ---- LOAD QUESTION ----
    async function loadQuestion() {
      answered = false;
      document.getElementById('nextBtnWrap').classList.remove('show');
      document.getElementById('feedback').classList.remove('show');

      const res = await fetch(`/api/question/${sessionId}`);
      const data = await res.json();

      if (data.finished) {
        window.location.href = `/resultado/${sessionId}`;
        return;
      }

      document.getElementById('questionCounter').textContent =
        `pergunta ${data.current} / ${data.total}`;
      document.getElementById('progressText').textContent = `${data.current - 1} / ${data.total}`;
      document.getElementById('progressFill').style.width =
        `${((data.current - 1) / data.total) * 100}%`;

      const qCard = document.querySelector('.question-card');
      qCard.style.animation = 'none';
      qCard.offsetHeight;
      qCard.style.animation = 'fadeSlideIn 0.35s ease';

      typeWriter(document.getElementById('questionText'), data.question);

      const container = document.getElementById('optionsContainer');
      container.innerHTML = '';
      container.style.animation = 'none';
      container.offsetHeight;
      container.style.animation = 'fadeSlideIn 0.35s ease';

      data.options.forEach((option, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="letter">${LETTERS[i]}</span><span class="option-text">${option}</span>`;
        btn.dataset.index = i;
        btn.onclick = () => selectAnswer(i);
        container.appendChild(btn);
      });
    }

    // ---- CONFETTI ----
    function fireConfetti() {
      const container = document.getElementById('confettiContainer');
      const emojis = ['🌸', '✨', '💕', '🌟', '🎀', '⭐', '♡', '🦋'];
      const colors = ['#ffb5c2', '#d4b8e8', '#a8e0c8', '#ffe88a', '#b8d8f0'];

      for (let i = 0; i < 20; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.textContent = emojis[i % emojis.length];
        piece.style.left = (20 + Math.random() * 60) + '%';
        piece.style.top = '-10px';
        piece.style.color = colors[i % colors.length];
        piece.style.animationDuration = (1.5 + Math.random() * 1) + 's';
        piece.style.animationDelay = Math.random() * 0.2 + 's';
        container.appendChild(piece);
        setTimeout(() => piece.remove(), 2500);
      }
    }

    // ---- SELECT ANSWER ----
    async function selectAnswer(index) {
      if (answered) return;
      answered = true;

      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(btn => (btn.disabled = true));
      buttons[index].classList.add('selected');

      const res = await fetch(`/api/answer/${sessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer: index }),
      });

      const data = await res.json();

      buttons.forEach((btn, i) => {
        if (i === data.correct_answer) btn.classList.add('correct');
        if (i === index && !data.correct) btn.classList.add('wrong');
      });

      const feedback = document.getElementById('feedback');
      const isCorrect = data.correct;
      feedback.className = `feedback show ${isCorrect ? 'correct' : 'wrong'}`;

      if (isCorrect) {
        correctCount++;
        fireConfetti();
        document.getElementById('feedbackIcon').textContent = '🎉';
        document.getElementById('feedbackText').textContent = data.fun_fact;

        if (correctCount % 2 === 0) {
          setTimeout(() => showPista(), 600);
        }
      } else {
        document.getElementById('feedbackIcon').textContent = '💗';
        const msg = carinhoMessages[Math.floor(Math.random() * carinhoMessages.length)];
        document.getElementById('feedbackText').textContent = msg;
      }

      document.getElementById('scoreBadge').innerHTML = `<span>❤️</span> ${data.score}`;
      document.getElementById('nextBtnWrap').classList.add('show');
    }

    // ---- GO NEXT ----
    function goNext() {
      document.getElementById('nextBtnWrap').classList.remove('show');
      document.getElementById('feedback').classList.remove('show');
      showLoading('preparando próxima pergunta...', () => {
        loadQuestion();
      });
    }

    // ---- mini heart mouse tracking (throttled) ----
    const miniHeart = document.getElementById('miniHeartSvg');
    const miniGroups = miniHeart ? miniHeart.querySelectorAll('.eye-group') : [];
    let miniTick = false;
    document.addEventListener('mousemove', (e) => {
      if (miniGroups.length === 0 || miniTick) return; miniTick = true;
      requestAnimationFrame(() => {
        const rect = document.getElementById('cardHeart').getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / Math.max(rect.width * 2, 1);
        const dy = (e.clientY - cy) / Math.max(rect.height * 2, 1);
        miniGroups.forEach(g => {
          g.setAttribute('transform', `translate(${dx * 2}, ${dy * 2})`);
        });
        miniTick = false;
      });
    });

    const urlParams = new URLSearchParams(window.location.search);
    const isResume = urlParams.get('resume') === '1';

    if (welcomeMessage && !isResume) {
      showWelcome();
    } else {
      loadQuestion();
    }
  </script>
</body>
</html>
