<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Nosso Quiz</title>
<link rel="stylesheet" href="/static/style.css">
<style>
:root { --radius: 14px; --radius-sm: 8px; }

/* layout */
.admin-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }

/* TABS */
.tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid rgba(255,181,194,0.2); }
.tab-btn { padding: 12px 24px; font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; border: none; background: none; color: var(--text-light); transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab-btn:hover { color: var(--pink); }
.tab-btn.active { color: var(--pink-dark); border-bottom-color: var(--pink); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* LOGIN OVERLAY */
#adminLoginOverlay { position: fixed; inset: 0; background: rgba(255,250,245,0.95); display: flex; align-items: center; justify-content: center; z-index: 100; }
#adminLoginOverlay.hidden { display: none; }

/* SESSIONS TAB */
.stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
.stat-card { flex: 1; min-width: 120px; background: var(--white); border-radius: var(--radius-sm); padding: 16px; text-align: center; border: 1px solid rgba(255,181,194,0.15); }
.stat-card .num { font-size: 1.6rem; font-weight: 700; color: var(--pink-dark); }
.stat-card .label { font-size: 0.7rem; color: var(--text-light); margin-top: 4px; }

.filter-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
.filter-row select, .filter-row input { font-family: inherit; padding: 8px 12px; border: 2px solid rgba(255,181,194,0.2); border-radius: var(--radius-sm); background: var(--white); font-size: 0.8rem; }
.filter-row select:focus { border-color: var(--pink); outline: none; }

.session-card { background: var(--white); border-radius: var(--radius-sm); margin-bottom: 12px; border: 1px solid rgba(255,181,194,0.15); overflow: hidden; }
.session-hd { display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; transition: background 0.15s; }
.session-hd:hover { background: rgba(255,181,194,0.05); }
.session-hd .profile-tag { font-family: 'Press Start 2P', monospace; font-size: 8px; background: var(--pink); color: white; padding: 3px 8px; border-radius: 4px; }
.session-hd .date { font-size: 0.75rem; color: var(--text-light); flex: 1; }
.session-hd .score-badge-admin { background: var(--cream); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }
.session-hd .score-badge-admin.high { color: #6b9e7a; }
.session-hd .score-badge-admin.mid { color: #d4a040; }
.session-hd .score-badge-admin.low { color: var(--pink-dark); }
.session-hd .arrow { transition: transform 0.2s; font-size: 0.7rem; color: var(--text-light); }
.session-card.open .arrow { transform: rotate(180deg); }
.session-bd { display: none; padding: 0 18px 14px; }
.session-card.open .session-bd { display: block; }
.session-bd table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.session-bd td { padding: 8px 6px; border-bottom: 1px solid rgba(255,181,194,0.1); }
.session-bd td:first-child { width: 50%; color: var(--text); }
.session-bd .q-correct td:last-child { color: #6b9e7a; }
.session-bd .q-wrong td:last-child { color: var(--pink-dark); }

/* PROFILES TAB */
.profiles-layout { display: flex; gap: 20px; min-height: 400px; }
.profile-list { width: 200px; flex-shrink: 0; }
.profile-list-item { padding: 10px 14px; cursor: pointer; border-radius: var(--radius-sm); font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; transition: all 0.15s; border: 1px solid transparent; }
.profile-list-item:hover { background: rgba(255,181,194,0.08); }
.profile-list-item.active { background: var(--cream); border-color: rgba(255,181,194,0.3); color: var(--pink-dark); }
.profile-list-item .add-icon { color: var(--pink); margin-right: 6px; }
.profile-editor { flex: 1; background: var(--white); border-radius: var(--radius-sm); padding: 20px; border: 1px solid rgba(255,181,194,0.15); }

.form-section { margin-bottom: 20px; }
.form-section h4 { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--pink-dark); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,181,194,0.15); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid .full { grid-column: 1 / -1; }
.form-grid label { font-size: 0.75rem; color: var(--text-light); display: block; margin-bottom: 3px; }
.form-grid input, .form-grid textarea, .form-grid select { width: 100%; padding: 8px 10px; border: 2px solid rgba(255,181,194,0.15); border-radius: var(--radius-sm); font-size: 0.82rem; font-family: inherit; background: var(--cream); box-sizing: border-box; outline: none; }
.form-grid input:focus, .form-grid textarea:focus { border-color: var(--pink); }

.form-grid textarea { resize: vertical; min-height: 60px; }

/* Questions table */
.q-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 8px; }
.q-table th { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--text-light); padding: 6px 4px; text-align: left; border-bottom: 1px solid rgba(255,181,194,0.2); }
.q-table td { padding: 6px 4px; border-bottom: 1px solid rgba(255,181,194,0.08); vertical-align: top; }
.q-table .q-edit input, .q-table .q-edit textarea { width: 100%; padding: 4px 6px; font-size: 0.78rem; border: 1px solid rgba(255,181,194,0.2); border-radius: 4px; font-family: inherit; background: var(--cream); box-sizing: border-box; }
.q-table .q-edit textarea { min-height: 32px; resize: vertical; }
.q-table .q-id { width: 30px; text-align: center; font-weight: 700; color: var(--text-light); }
.q-table .q-del { width: 30px; text-align: center; cursor: pointer; color: var(--pink-dark); font-size: 1rem; }
.q-table .q-del:hover { opacity: 0.7; }
.q-table .q-text { min-width: 160px; }
.q-table .q-opts { min-width: 200px; }
.q-table .q-opts input { margin-bottom: 2px; }
.q-table .q-correct { width: 50px; text-align: center; }
.q-table .q-correct select { padding: 2px; font-size: 0.78rem; }
.q-table .q-fact { min-width: 120px; }

.btn-sm { padding: 6px 14px; font-family: 'Press Start 2P', monospace; font-size: 8px; border: none; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
.btn-sm.primary { background: var(--pink); color: white; }
.btn-sm.primary:hover { background: var(--pink-dark); }
.btn-sm.secondary { background: var(--cream); color: var(--text); }
.btn-sm.secondary:hover { background: rgba(255,181,194,0.2); }
.btn-sm.danger { background: rgba(255,92,112,0.1); color: var(--pink-dark); }
.btn-sm.danger:hover { background: rgba(255,92,112,0.2); }

.btn-add { width: 100%; padding: 8px; margin-top: 8px; font-family: 'Press Start 2P', monospace; font-size: 8px; border: 2px dashed rgba(255,181,194,0.3); border-radius: var(--radius-sm); background: none; cursor: pointer; color: var(--text-light); transition: all 0.15s; }
.btn-add:hover { border-color: var(--pink); color: var(--pink); }

.save-bar { display: flex; gap: 10px; justify-content: flex-end; padding-top: 16px; border-top: 1px solid rgba(255,181,194,0.15); margin-top: 16px; }
.save-bar .btn { min-width: 120px; }

.admin-msg { padding: 10px 14px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 0.82rem; display: none; }
.admin-msg.success { display: block; background: rgba(107,158,122,0.1); color: #6b9e7a; border: 1px solid rgba(107,158,122,0.2); }
.admin-msg.error { display: block; background: rgba(255,92,112,0.1); color: var(--pink-dark); border: 1px solid rgba(255,92,112,0.2); }

/* No profile selected placeholder */
.no-profile { text-align: center; padding: 60px 20px; color: var(--text-light); }
.no-profile span { font-size: 3rem; display: block; margin-bottom: 12px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 0.82rem; z-index: 200; animation: fadeInUp 0.3s ease; }
.toast.success { background: #6b9e7a; color: white; }
.toast.error { background: var(--pink-dark); color: white; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="floating-bg"></div>

<!-- LOGIN OVERLAY -->
<div id="adminLoginOverlay">
  <div class="admin-card" style="max-width:420px;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 24px;text-align:center;margin:0 16px;border:2px solid rgba(255,181,194,0.3);">
    <div class="card-heart">
      <svg viewBox="-10 -10 140 130" width="28" height="28">
        <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb5c2"/><stop offset="100%" stop-color="#ff8fa0"/></linearGradient>
        <filter id="s" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff8fa0" flood-opacity="0.3"/></filter></defs>
        <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#g)" filter="url(#s)"/>
      </svg>
    </div>
    <h1 class="title"><span class="title-highlight">Admin</span></h1>
    <div class="title-sub">acesso restrito</div>
    <div style="display:flex;flex-direction:column;gap:14px;margin-top:20px;">
      <input type="text" id="adminUser" placeholder="usuário" autocomplete="off" style="padding:14px 18px;font-family:'Press Start 2P',monospace;font-size:10px;border:2px solid rgba(255,181,194,0.3);border-radius:var(--radius-sm);text-align:center;">
      <input type="password" id="adminPass" placeholder="senha" style="padding:14px 18px;font-family:'Press Start 2P',monospace;font-size:10px;border:2px solid rgba(255,181,194,0.3);border-radius:var(--radius-sm);text-align:center;">
      <div id="adminError" style="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--pink-dark);min-height:20px;"></div>
      <button class="btn btn-primary" id="adminBtn" onclick="adminLogin()">entrar 🔐</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="admin-wrap" id="adminWrap" style="display:none;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <div>
      <h1 style="margin:0;font-size:1.1rem;">Painel de Controle</h1>
      <div style="font-size:0.75rem;color:var(--text-light);margin-top:4px;">visualize resultados e gerencie perfis</div>
    </div>
    <button class="btn-sm secondary" onclick="adminLogout()">sair</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="sessions">📊 Sessões</button>
    <button class="tab-btn" data-tab="profiles">👤 Perfis</button>
  </div>

  <!-- SESSIONS TAB -->
  <div class="tab-content active" id="tabSessions">
    <div class="stats-row" id="statsRow"></div>
    <div class="filter-row">
      <select id="profileFilter" onchange="renderSessions()">
        <option value="">Todos os perfis</option>
      </select>
      <input type="text" id="sessionSearch" placeholder="buscar por ID..." oninput="renderSessions()">
    </div>
    <div id="sessionList"></div>
  </div>

  <!-- PROFILES TAB -->
  <div class="tab-content" id="tabProfiles">
    <div id="adminMsg" class="admin-msg"></div>
    <div class="profiles-layout">
      <div class="profile-list" id="profileList"></div>
      <div class="profile-editor" id="profileEditor"></div>
    </div>
  </div>
</div>

<script>
// ---- STATE ----
let ALL_SESSIONS = [];
let ALL_PROFILES = {};
let SELECTED_PROFILE = null;
let AUTH = { username: '', password: '' };

// ---- LOGIN ----
async function adminLogin() {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  const err = document.getElementById('adminError');
  const btn = document.getElementById('adminBtn');
  err.textContent = ''; btn.innerHTML = '<span class=spinner></span>'; btn.disabled = true;
  try {
    const r = await fetch('/api/admin/results', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: u, password: p})
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.detail || 'Erro'); }
    AUTH = { username: u, password: p };
    document.getElementById('adminLoginOverlay').classList.add('hidden');
    document.getElementById('adminWrap').style.display = 'block';
    await loadAll();
  } catch (e) { err.textContent = e.message; btn.innerHTML = 'entrar 🔐'; btn.disabled = false; }
}

function adminLogout() {
  AUTH = {};
  document.getElementById('adminLoginOverlay').classList.remove('hidden');
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('adminUser').value = '';
  document.getElementById('adminPass').value = '';
  document.getElementById('adminBtn').innerHTML = 'entrar 🔐';
  document.getElementById('adminBtn').disabled = false;
}

// ---- LOAD ALL DATA ----
async function loadAll() {
  try {
    const [sessRes, profRes] = await Promise.all([
      fetch('/api/admin/results', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(AUTH) }),
      fetch('/api/admin/profiles', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(AUTH) })
    ]);
    const sessData = await sessRes.json();
    const profData = await profRes.json();
    ALL_SESSIONS = sessData.sessions || [];
    ALL_PROFILES = profData.profiles || {};
    window.NEW_PROFILE_TEMPLATE = profData.template || null;

    // Populate profile filter
    const sel = document.getElementById('profileFilter');
    sel.innerHTML = '<option value="">Todos os perfis</option>';
    Object.keys(ALL_PROFILES).forEach(k => {
      sel.innerHTML += `<option value="${k}">${k}</option>`;
    });

    renderSessions();
    renderProfileList();
    selectProfile(Object.keys(ALL_PROFILES)[0] || null);
  } catch(e) {
    showToast('Erro ao carregar dados: ' + e.message, 'error');
  }
}

// ---- SESSIONS TAB ----
function renderSessions() {
  const filter = document.getElementById('profileFilter').value;
  const search = document.getElementById('sessionSearch').value.toLowerCase().trim();

  let sessions = ALL_SESSIONS;
  if (filter) sessions = sessions.filter(s => s.profile_id === filter);
  if (search) sessions = sessions.filter(s => s.session_id.toLowerCase().includes(search));

  // Stats
  const totalSessions = sessions.length;
  const totalCorrect = sessions.reduce((acc, s) => acc + s.score, 0);
  const totalQuestions = sessions.reduce((acc, s) => acc + (s.answers || []).length, 0);
  const overallPct = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;

  document.getElementById('statsRow').innerHTML = `
    <div class=stat-card><div class=num>${totalSessions}</div><div class=label>Sessões</div></div>
    <div class=stat-card><div class=num>${overallPct}%</div><div class=label>Acerto geral</div></div>
    <div class=stat-card><div class=num>${totalCorrect}/${totalQuestions}</div><div class=label>Corretas</div></div>
  `;

  if (sessions.length === 0) {
    document.getElementById('sessionList').innerHTML = '<div style="text-align:center;color:var(--text-light);padding:40px 0;">Nenhuma sessão encontrada.</div>';
    return;
  }

  let html = '';
  sessions.forEach(s => {
    const pct = s.total > 0 ? Math.round((s.score / s.total) * 100) : 0;
    const cls = pct >= 70 ? 'high' : pct >= 40 ? 'mid' : 'low';
    html += `<div class=session-card id="sc-${s.session_id}">
      <div class=session-hd onclick="toggleSession('${s.session_id}')">
        <span class=profile-tag>${s.profile_id}</span>
        <span class=date>${s.started_at || '—'} · ${s.session_id}</span>
        <span class="score-badge-admin ${cls}">${s.score}/${s.total} (${pct}%)</span>
        <span class=arrow>▾</span>
      </div>
      <div class=session-bd>`;
    (s.answers || []).forEach(a => {
      const rowCls = a.was_correct ? 'q-correct' : 'q-wrong';
      html += `<tr class="${rowCls}"><td>${esc(a.question)}</td><td>${a.was_correct ? '✅ '+esc(a.fun_fact) : '❌ '+esc(a.selected)}</td></tr>`;
    });
    html += `</table></div></div>`;
  });
  document.getElementById('sessionList').innerHTML = html;
}

function toggleSession(id) {
  const card = document.getElementById('sc-' + id);
  if (card) card.classList.toggle('open');
}

// ---- PROFILES TAB ----
function renderProfileList() {
  const keys = Object.keys(ALL_PROFILES);
  let html = '';
  keys.forEach(k => {
    const active = SELECTED_PROFILE === k ? 'active' : '';
    html += `<div class="profile-list-item ${active}" onclick="selectProfile('${k}')">${k}</div>`;
  });
  html += `<div class="profile-list-item" onclick="newProfile()"><span class=add-icon>+</span> Novo Perfil</div>`;
  document.getElementById('profileList').innerHTML = html;
}

function selectProfile(key) {
  if (!key || !ALL_PROFILES[key]) {
    document.getElementById('profileEditor').innerHTML = `<div class=no-profile><span>👤</span>Selecione um perfil para editar</div>`;
    SELECTED_PROFILE = null;
    renderProfileList();
    return;
  }
  SELECTED_PROFILE = key;
  renderProfileList();
  renderProfileEditor(key);
}

function renderProfileEditor(key) {
  const p = ALL_PROFILES[key];
  const questions = p.questions || [];
  const pistas = p.pistas || [];
  const carinho = p.carinhoMessages || [];

  let html = `<div class=form-section>
    <h4>Informações Básicas</h4>
    <div class=form-grid>
      <div><label>ID (nome do perfil)</label><input value="${esc(key)}" id="pf_id" onchange="markDirty()"></div>
      <div><label>Senha</label><input value="${esc(p.password||'')}" id="pf_password" onchange="markDirty()"></div>
      <div><label>Título</label><input value="${esc(p.title||'')}" id="pf_title" onchange="markDirty()"></div>
      <div><label>Subtítulo</label><input value="${esc(p.subtitle||'')}" id="pf_subtitle" onchange="markDirty()"></div>
      <div><label>Emoji</label><input value="${esc(p.emoji||'')}" id="pf_emoji" onchange="markDirty()"></div>
      <div><label>Instagram</label><input value="${esc(p.instagram||'')}" id="pf_instagram" onchange="markDirty()"></div>
      <div class=full><label>Mensagem de Boas-Vindas</label><textarea rows=3 id="pf_welcome" onchange="markDirty()">${esc(p.welcomeMessage||'')}</textarea></div>
      <div class=full><label>Mensagem "Sim"</label><textarea rows=2 id="pf_yesMsg" onchange="markDirty()">${esc(p.yesMessage||'')}</textarea></div>
      <div class=full><label>Footer "Sim"</label><textarea rows=1 id="pf_yesFooter" onchange="markDirty()">${esc(p.yesFooter||'')}</textarea></div>
      <div class=full><label>Mensagem "Não"</label><textarea rows=2 id="pf_noMsg" onchange="markDirty()">${esc(p.noMessage||'')}</textarea></div>
      <div class=full><label>Footer "Não"</label><textarea rows=1 id="pf_noFooter" onchange="markDirty()">${esc(p.noFooter||'')}</textarea></div>
    </div>
  </div>`;

  // Result messages
  html += `<div class=form-section><h4>Mensagens de Resultado</h4><div class=form-grid>`;
  ['high','mid','low'].forEach(tier => {
    const rm = (p.resultMessages||{})[tier] || {};
    html += `<div><label>${tier} — mensagem</label><textarea rows=2 id="rm_${tier}_msg" onchange="markDirty()">${esc(rm.message||'')}</textarea></div>`;
    html += `<div><label>${tier} — pergunta final</label><textarea rows=1 id="rm_${tier}_final" onchange="markDirty()">${esc(rm.final_question||'')}</textarea></div>`;
  });
  html += `</div></div>`;

  // Questions
  html += `<div class=form-section><h4>Perguntas</h4>
    <table class=q-table>
      <thead><tr><th class=q-id>#</th><th class=q-text>Pergunta</th><th class=q-opts>Opções (1 por linha)</th><th class=q-correct>Correta</th><th class=q-fact>Fun Fact</th><th class=q-del></th></tr></thead>
      <tbody id="qBody">`;
  questions.forEach((q, i) => {
    const optsText = (q.options||[]).join('\n');
    html += `<tr class="q-edit" data-qidx="${i}">
      <td class=q-id>${q.id}</td>
      <td><textarea rows=2 class="q_field" data-field="question">${esc(q.question)}</textarea></td>
      <td><textarea rows=4 class="q_field" data-field="options">${esc(optsText)}</textarea></td>
      <td class=q-correct><select class="q_field" data-field="correct" onchange="markDirty()">${[0,1,2,3].map(j => `<option value="${j}" ${j===q.correct?'selected':''}>${j}</option>`).join('')}</select></td>
      <td><textarea rows=2 class="q_field" data-field="fun_fact">${esc(q.fun_fact||'')}</textarea></td>
      <td class=q-del onclick="deleteQuestion(${i})">✕</td>
    </tr>`;
  });
  html += `</tbody></table>
    <button class=btn-add onclick="addQuestion()">+ Adicionar Pergunta</button>
  </div>`;

  // Pistas
  html += `<div class=form-section><h4>Pistas</h4><div id="pistasContainer">`;
  pistas.forEach((pi, i) => {
    html += `<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center;">
      <textarea rows=2 style="flex:1;padding:6px 8px;border:2px solid rgba(255,181,194,0.15);border-radius:var(--radius-sm);font-size:0.8rem;font-family:inherit;" class="pista_field" data-pidx="${i}">${esc(pi.join('|'))}</textarea>
      <span style="cursor:pointer;color:var(--pink-dark);font-size:1.1rem;" onclick="deletePista(${i})">✕</span>
    </div>`;
  });
  html += `</div><button class=btn-add onclick="addPista()">+ Adicionar Pista</button></div>`;

  // Carinho Messages
  html += `<div class=form-section><h4>Mensagens de Carinho</h4><textarea rows=4 style="width:100%;padding:8px 10px;border:2px solid rgba(255,181,194,0.15);border-radius:var(--radius-sm);font-size:0.82rem;font-family:inherit;box-sizing:border-box;" id="carinhoField" onchange="markDirty()">${esc(carinho.join('\n'))}</textarea></div>`;

  // Save bar
  html += `<div class=save-bar>
    <button class="btn btn-secondary" onclick="selectProfile(SELECTED_PROFILE)">Cancelar</button>
    <button class="btn btn-primary" onclick="saveProfile()">💾 Salvar</button>
  </div>`;

  document.getElementById('profileEditor').innerHTML = html;
}

function markDirty() {}

function collectProfileData() {
  const key = SELECTED_PROFILE;
  let newKey = document.getElementById('pf_id')?.value.trim() || key;
  const p = {};

  p.password = document.getElementById('pf_password')?.value || '';
  p.title = document.getElementById('pf_title')?.value || '';
  p.subtitle = document.getElementById('pf_subtitle')?.value || '';
  p.emoji = document.getElementById('pf_emoji')?.value || '';
  p.instagram = document.getElementById('pf_instagram')?.value || '';
  p.welcomeMessage = document.getElementById('pf_welcome')?.value || '';

  // Result messages
  p.resultMessages = {};
  ['high','mid','low'].forEach(tier => {
    p.resultMessages[tier] = {
      message: document.getElementById(`rm_${tier}_msg`)?.value || '',
      final_question: document.getElementById(`rm_${tier}_final`)?.value || '',
      emoji: tier === 'high' ? '🥰' : tier === 'mid' ? '😊' : '😂',
      title: tier === 'high' ? 'Perfeito!' : tier === 'mid' ? 'Quase lá!' : 'Ops!'
    };
  });

  // Questions
  const rows = document.querySelectorAll('#qBody .q-edit');
  const questions = [];
  rows.forEach((row, idx) => {
    const qtext = row.querySelector('.q_field[data-field="question"]')?.value || '';
    const optsRaw = row.querySelector('.q_field[data-field="options"]')?.value || '';
    const opts = optsRaw.split('\n').map(s => s.trim()).filter(Boolean);
    const correct = parseInt(row.querySelector('.q_field[data-field="correct"]')?.value || '0');
    const funFact = row.querySelector('.q_field[data-field="fun_fact"]')?.value || '';
    questions.push({
      id: idx + 1,
      question: qtext,
      options: opts,
      correct: correct,
      fun_fact: funFact
    });
  });
  p.questions = questions;

  // Pistas
  const pistaEls = document.querySelectorAll('.pista_field');
  const pistas = [];
  pistaEls.forEach(el => {
    const parts = (el.value || '').split('|').map(s => s.trim()).filter(Boolean);
    if (parts.length > 0) pistas.push(parts);
  });
  p.pistas = pistas;

  // Carinho messages
  const carinhoRaw = document.getElementById('carinhoField')?.value || '';
  p.carinhoMessages = carinhoRaw.split('\n').map(s => s.trim()).filter(Boolean);

  // Yes/No messages
  p.yesMessage = document.getElementById('pf_yesMsg')?.value || '';
  p.yesFooter = document.getElementById('pf_yesFooter')?.value || '';
  p.noMessage = document.getElementById('pf_noMsg')?.value || '';
  p.noFooter = document.getElementById('pf_noFooter')?.value || '';

  return { oldKey: key, newKey: newKey, profile: p };
}

async function saveProfile() {
  const data = collectProfileData();
  if (!data.profile.password) { showToast('A senha é obrigatória.', 'error'); return; }
  if (data.profile.questions.length === 0) { showToast('Adicione pelo menos uma pergunta.', 'error'); return; }

  const payload = { username: AUTH.username, password: AUTH.password, profiles: {} };
  payload.profiles[data.newKey] = data.profile;

  // If the key changed, keep the old profile too (we'll delete it separately)
  // Actually, let's just save the new key - if the old key is different, we remove it
  try {
    const r = await fetch('/api/admin/profiles/save', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.detail || 'Erro ao salvar'); }
    // If key changed, delete old key by saving without it
    if (data.newKey !== data.oldKey) {
      const allProfiles = { ...ALL_PROFILES };
      delete allProfiles[data.oldKey];
      allProfiles[data.newKey] = data.profile;
      const delPayload = { username: AUTH.username, password: AUTH.password, profiles: allProfiles };
      await fetch('/api/admin/profiles/save', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(delPayload)
      });
    }
    showToast('Perfil salvo com sucesso! ✅', 'success');
    await loadAll();
    selectProfile(data.newKey);
  } catch(e) {
    showToast('Erro: ' + e.message, 'error');
  }
}

function addQuestion() {
  const tbody = document.getElementById('qBody');
  const count = tbody.querySelectorAll('.q-edit').length;
  const tr = document.createElement('tr');
  tr.className = 'q-edit';
  tr.innerHTML = `
    <td class=q-id>${count + 1}</td>
    <td><textarea rows=2 class="q_field" data-field="question"></textarea></td>
    <td><textarea rows=4 class="q_field" data-field="options"></textarea></td>
    <td class=q-correct><select class="q_field" data-field="correct">${[0,1,2,3].map(j => `<option value="${j}">${j}</option>`).join('')}</select></td>
    <td><textarea rows=2 class="q_field" data-field="fun_fact"></textarea></td>
    <td class=q-del onclick="deleteQuestion(this)">✕</td>`;
  tbody.appendChild(tr);
  // Reindex IDs
  tbody.querySelectorAll('.q-edit').forEach((row, i) => {
    row.querySelector('.q-id').textContent = i + 1;
  });
}

function deleteQuestion(el) {
  if (typeof el === 'number') {
    const row = document.querySelector(`.q-edit[data-qidx="${el}"]`);
    if (row) row.remove();
  } else {
    el.closest('tr').remove();
  }
  // Reindex
  const tbody = document.getElementById('qBody');
  tbody.querySelectorAll('.q-edit').forEach((row, i) => {
    row.querySelector('.q-id').textContent = i + 1;
  });
}

function addPista() {
  const container = document.getElementById('pistasContainer');
  const idx = container.querySelectorAll('.pista_field').length;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;margin-bottom:6px;align-items:center;';
  div.innerHTML = `<textarea rows=2 style="flex:1;padding:6px 8px;border:2px solid rgba(255,181,194,0.15);border-radius:var(--radius-sm);font-size:0.8rem;font-family:inherit;" class="pista_field"></textarea>
    <span style="cursor:pointer;color:var(--pink-dark);font-size:1.1rem;" onclick="this.parentElement.remove()">✕</span>`;
  container.appendChild(div);
}

function deletePista(idx) {
  const el = document.querySelector(`.pista_field[data-pidx="${idx}"]`);
  if (el) el.closest('div').remove();
}

function newProfile() {
  const tpl = window.NEW_PROFILE_TEMPLATE || {
    password: '', title: '', subtitle: '', emoji: '💕', instagram: '@',
    welcomeMessage: '', yesMessage: '', yesFooter: '', noMessage: '', noFooter: '',
    resultMessages: {
      high: { message: '', final_question: '', emoji: '🥰', title: 'Perfeito!' },
      mid: { message: '', final_question: '', emoji: '😊', title: 'Quase lá!' },
      low: { message: '', final_question: '', emoji: '😂', title: 'Ops!' }
    },
    questions: [{ id:1, question:'', options:['','','',''], correct:0, fun_fact:'' }],
    pistas: [],
    carinhoMessages: []
  };
  const key = 'novo_perfil';
  if (ALL_PROFILES[key]) {
    let i = 1;
    while (ALL_PROFILES[`novo_perfil_${i}`]) i++;
    SELECTED_PROFILE = `novo_perfil_${i}`;
  } else {
    SELECTED_PROFILE = key;
  }
  ALL_PROFILES[SELECTED_PROFILE] = JSON.parse(JSON.stringify(tpl));
  renderProfileList();
  renderProfileEditor(SELECTED_PROFILE);
}

// ---- TABS ----
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab' + btn.dataset.tab.charAt(0).toUpperCase() + btn.dataset.tab.slice(1)).classList.add('active');
  });
});

// ---- UTILS ----
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
