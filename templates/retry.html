<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#ffb5c2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
  <title>Quiz {{ emoji }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="floating-bg"></div>
  <div class="floating-items" id="floatingItems"></div>

  <div class=container>
    <div class=card style="padding:40px 24px;">
      <div class=card-heart>
        <svg viewBox="-10 -10 140 130" width="28" height="28">
          <defs>
            <linearGradient id="gR" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb5c2"/><stop offset="100%" stop-color="#ff8fa0"/></linearGradient>
            <filter id="sR" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#ff8fa0" flood-opacity="0.3"/></filter>
          </defs>
          <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#gR)" filter="url(#sR)"/>
        </svg>
      </div>

      <div class=heart-character style="cursor:default;">
        <svg viewBox="-15 -15 150 150" width="100" height="100">
          <defs>
            <linearGradient id="hG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffb5c2"/><stop offset="100%" stop-color="#ff8fa0"/></linearGradient>
            <filter id="hS" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#ff8fa0" flood-opacity="0.35"/></filter>
          </defs>
          <path d="M60 100 C20 70 0 50 0 30 C0 12 15 0 30 0 C40 0 50 8 60 20 C70 8 80 0 90 0 C105 0 120 12 120 30 C120 50 100 70 60 100Z" fill="url(#hG)" filter="url(#hS)"/>
          <ellipse cx="80" cy="25" rx="18" ry="10" fill="rgba(255,255,255,0.4)" transform="rotate(-20 80 25)"/>
          <circle cx="42" cy="42" r="8" fill="white"/>
          <g class="eye-group" data-origin-x="45" data-origin-y="44">
            <circle class="pupil" cx="45" cy="44" r="4.5" fill="#4a3a5a"/>
            <circle cx="46.5" cy="42" r="1.8" fill="white"/>
          </g>
          <circle cx="78" cy="42" r="8" fill="white"/>
          <g class="eye-group" data-origin-x="81" data-origin-y="44">
            <circle class="pupil" cx="81" cy="44" r="4.5" fill="#4a3a5a"/>
            <circle cx="82.5" cy="42" r="1.8" fill="white"/>
          </g>
          <ellipse cx="30" cy="56" rx="8" ry="4" fill="rgba(255,92,112,0.2)"/>
          <ellipse cx="90" cy="56" rx="8" ry="4" fill="rgba(255,92,112,0.2)"/>
          <path d="M48 58 Q60 68 72 58" stroke="#4a3a5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <div style="font-size:0.95rem;line-height:1.9;color:var(--text);margin-bottom:24px;text-wrap:pretty;white-space:pre-line;" id="messageText"></div>
      <button class="btn btn-primary" onclick="prosseguir()">Prosseguir 💕</button>
    </div>
  </div>

  <script>
    const name = {{ profile_name|safe }};
    const sessionId = '{{ session_id }}';
    const emoji = '{{ emoji }}';

    // Floating decorations (minimal)
    const vars = ['💕','❤️','💗','💖'];
    const fc = document.getElementById('floatingItems');
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('span');
      s.textContent = vars[i % vars.length];
      s.style.cssText = `position:absolute;left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;animation:floatAround ${8+Math.random()*4}s ease-in-out infinite;animation-delay:${Math.random()*4}s;font-size:${16+Math.random()*14}px;opacity:0.35;pointer-events:none;`;
      fc.appendChild(s);
    }

    const lines = [
      `Parece que você está tentando mudar de ideia, ${name}… 💭`,
      ``,
      `Obrigado por ter feito o quiz! 💕`,
      `Se quiser rever o resultado é só clicar no botão abaixo.`,
    ];
    let lineIdx = 0;
    let charIdx = 0;
    const el = document.getElementById('messageText');
    el.textContent = '';

    function typeNextChar() {
      if (lineIdx >= lines.length) return;
      const line = lines[lineIdx];
      if (charIdx < line.length) {
        el.textContent += line.charAt(charIdx);
        charIdx++;
        setTimeout(typeNextChar, 20 + Math.random() * 30);
      } else {
        el.textContent += '\n';
        lineIdx++;
        charIdx = 0;
        setTimeout(typeNextChar, 200);
      }
    }
    setTimeout(typeNextChar, 300);

    // Eye tracking (throttled)
    const heartEl = document.querySelector('.heart-character');
    const eyeGroups = heartEl.querySelectorAll('.eye-group');
    let eyeTick = false;
    document.addEventListener('mousemove', (e) => {
      if (eyeTick) return; eyeTick = true;
      requestAnimationFrame(() => {
        const rect = heartEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) / Math.max(rect.width, 1);
        const dy = (e.clientY - cy) / Math.max(rect.height, 1);
        const maxMove = 3;
        eyeGroups.forEach(g => {
          g.setAttribute('transform', `translate(${Math.max(-maxMove,Math.min(maxMove,dx*maxMove))}, ${Math.max(-maxMove,Math.min(maxMove,dy*maxMove))})`);
        });
        eyeTick = false;
      });
    });

    function prosseguir() {
      window.location.href = `/resultado/${sessionId}`;
    }
  </script>
</body>
</html>
