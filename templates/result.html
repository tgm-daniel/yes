<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado 💕</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="hearts-rain" id="heartsRain"></div>
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="card">
      <div id="resultContent">
        <span class="result-emoji" id="resultEmoji">💕</span>

        <div class="result-score-wrap">
          <span class="result-score" id="resultScore">0</span>
          <span class="result-score-total" id="resultTotal">/10</span>
        </div>
        <div class="result-label" id="resultLabel">perguntas certas</div>

        <div class="result-message" id="resultMessage"></div>

        <div class="final-question" id="finalQuestion"></div>

        <div class="final-buttons" id="finalButtons">
          <button class="btn btn-yes" onclick="answerYes()">sim! 💕</button>
          <button class="btn btn-no" onclick="answerNo()">não 😢</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sessionId = window.location.pathname.split('/').pop();
    const hearts = ['💕', '❤️', '💗', '💖', '💝', '💘', '🥰'];
    const stars = ['✦', '★', '✧', '☆', '⋆'];

    function startHeartsRain() {
      const container = document.getElementById('heartsRain');
      for (let i = 0; i < 25; i++) {
        const span = document.createElement('span');
        span.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.fontSize = (14 + Math.random() * 22) + 'px';
        span.style.animationDuration = (5 + Math.random() * 5) + 's';
        span.style.animationDelay = Math.random() * 4 + 's';
        container.appendChild(span);
      }
    }

    function addStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 15; i++) {
        const span = document.createElement('span');
        span.textContent = stars[i % stars.length];
        span.style.left = Math.random() * 100 + '%';
        span.style.top = Math.random() * 100 + '%';
        span.style.animationDelay = Math.random() * 3 + 's';
        span.style.fontSize = (10 + Math.random() * 10) + 'px';
        container.appendChild(span);
      }
    }

    async function loadResult() {
      const res = await fetch(`/api/result/${sessionId}`);
      const data = await res.json();

      document.getElementById('resultScore').textContent = data.score;
      document.getElementById('resultTotal').textContent = `/${data.total}`;
      document.getElementById('resultLabel').textContent =
        data.score === 1 ? 'pergunta certa' : 'perguntas certas';

      if (data.percentage >= 80) {
        document.getElementById('resultEmoji').textContent = '🥰';
        document.title = 'Você me conhece! 💕';
        startHeartsRain();
      } else if (data.percentage >= 50) {
        document.getElementById('resultEmoji').textContent = '😊';
      } else {
        document.getElementById('resultEmoji').textContent = '😂';
      }

      document.getElementById('resultMessage').textContent = data.message;
      document.getElementById('finalQuestion').textContent = data.final_question;
      addStars();
    }

    function answerYes() {
      const content = document.getElementById('resultContent');
      content.innerHTML = `
        <div class="final-card-content">
          <span style="font-size: 72px; display: block; margin-bottom: 8px; animation: bounce 2s ease-in-out infinite;">🥹💕</span>
          <h1 class="title">ainda bem que você disse sim!</h1>
          <p class="subtitle" style="font-size: 1.15rem;">
            eu nunca parei de pensar em você.<br>
            vamos escrever um novo capítulo juntos? 💕
          </p>
          <p style="font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--pink-dark); margin-top: 16px;">
            eu te amo ❤️
          </p>
        </div>
      `;
      startHeartsRain();
    }

    function answerNo() {
      const content = document.getElementById('resultContent');
      content.innerHTML = `
        <div class="final-card-content">
          <span style="font-size: 72px; display: block; margin-bottom: 8px;">😢💔</span>
          <h1 class="title">eu entendo...</h1>
          <p class="subtitle" style="font-size: 1.1rem;">
            algumas histórias terminam,<br>
            mas isso não apaga o que a gente viveu.<br><br>
            obrigado por ter feito parte da minha vida.<br>
            se um dia mudar de ideia, eu vou estar aqui. 💕
          </p>
        </div>
      `;
    }

    loadResult();
  </script>
</body>
</html>
