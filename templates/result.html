<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado 💕</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="hearts-container" id="heartsContainer"></div>
  <div class="container" style="position: relative; z-index: 1;">
    <div class="card">
      <span class="result-emoji" id="resultEmoji">💕</span>
      <div class="result-score" id="resultScore">0/10</div>
      <div class="result-label" id="resultLabel">você acertou</div>
      <div class="result-message" id="resultMessage"></div>
      <div class="final-question" id="finalQuestion"></div>
      <div class="final-buttons">
        <button class="btn btn-yes" onclick="answerYes()">Sim! 💕</button>
        <button class="btn btn-no" onclick="answerNo()">Não 😢</button>
      </div>
    </div>
  </div>

  <script>
    const sessionId = window.location.pathname.split('/').pop();

    async function loadResult() {
      const res = await fetch(`/api/result/${sessionId}`);
      const data = await res.json();

      document.getElementById('resultScore').textContent = `${data.score}/${data.total}`;
      document.getElementById('resultLabel').textContent =
        data.score === 1 ? 'pergunta certa' : 'perguntas certas';

      if (data.percentage >= 80) {
        document.getElementById('resultEmoji').textContent = '🥰';
        document.title = 'Você me conhece! 💕';
        startHearts();
      } else if (data.percentage >= 50) {
        document.getElementById('resultEmoji').textContent = '😊';
      } else {
        document.getElementById('resultEmoji').textContent = '😂';
      }

      document.getElementById('resultMessage').textContent = data.message;
      document.getElementById('finalQuestion').textContent = data.final_question;
    }

    function startHearts() {
      const container = document.getElementById('heartsContainer');
      const hearts = ['💕', '❤️', '💗', '💖', '💝', '💘', '🥰'];
      for (let i = 0; i < 30; i++) {
        const span = document.createElement('span');
        span.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        span.style.left = Math.random() * 100 + '%';
        span.style.fontSize = (16 + Math.random() * 24) + 'px';
        span.style.animationDuration = (4 + Math.random() * 4) + 's';
        span.style.animationDelay = Math.random() * 4 + 's';
        container.appendChild(span);
      }
    }

    function answerYes() {
      const card = document.querySelector('.card');
      card.innerHTML = `
        <span style="font-size: 80px; display: block; margin-bottom: 16px;">🥹💕</span>
        <h1 class="title">Ainda bem que você disse sim!</h1>
        <p class="subtitle" style="font-size: 1.2rem;">
          Eu nunca parei de pensar em você.<br>
          Vou te procurar no nosso lugar favorito.<br>
          Te espero lá... 💕
        </p>
        <p style="font-family: 'Dancing Script', cursive; font-size: 1.5rem; color: var(--primary); margin-top: 20px;">
          Eu te amo ❤️
        </p>
      `;
      startHearts();
    }

    function answerNo() {
      const card = document.querySelector('.card');
      card.innerHTML = `
        <span style="font-size: 80px; display: block; margin-bottom: 16px;">😢💔</span>
        <h1 class="title">Eu entendo...</h1>
        <p class="subtitle" style="font-size: 1.1rem;">
          Às vezes as histórias terminam,<br>
          mas isso não apaga o que vivemos.<br>
          Obrigado por ter participado da minha vida.<br><br>
          Se um dia mudar de ideia,<br>
          eu vou estar aqui. 💕
        </p>
        <p style="font-family: 'Dancing Script', cursive; font-size: 1.3rem; color: var(--text-light); margin-top: 20px;">
        Com carinho ❤️
        </p>
      `;
    }

    loadResult();
  </script>
</body>
</html>
